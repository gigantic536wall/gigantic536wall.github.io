<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-eval' 'unsafe-inline' https://www.gstatic.com https://*.firebaseio.com https://*.googleapis.com;">
    <title>Аниме викторина | 8 раундов</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        input, button {
            padding: 12px 20px;
            margin: 10px;
            border-radius: 40px;
            border: none;
            font-size: 16px;
        }
        button {
            background: #ff4757;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }
        button:hover {
            background: #ff6b81;
            transform: scale(1.02);
        }
        .team-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        .team-btn {
            width: 160px;
            padding: 20px 10px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 60px;
            transition: 0.2s;
        }
        .team-btn[data-team="0"] { background: #3498db; }
        .team-btn[data-team="1"] { background: #2ecc71; }
        .team-btn[data-team="2"] { background: #f39c12; }
        .team-btn[data-team="3"] { background: #9b59b6; }
        .team-btn.selected { background: #ff4757; box-shadow: 0 0 15px rgba(255,71,87,0.5); transform: scale(1.02); }
        
        .admin-panel {
            border-top: 2px solid #ff4757;
            margin-top: 20px;
            padding-top: 20px;
        }
        .team-display {
            display: inline-block;
            background: rgba(0,0,0,0.5);
            margin: 10px;
            padding: 10px;
            border-radius: 15px;
            min-width: 150px;
            vertical-align: top;
        }
        .waiting { font-size: 24px; color: #ffaa00; }
        .question-block { background: rgba(0,0,0,0.6); border-radius: 20px; padding: 20px; margin-top: 20px; }
        .hidden { display: none; }
        .score { font-size: 20px; margin-top: 20px; }
        .error-message { color: #ff8888; background: #440000; padding: 10px; border-radius: 10px; margin: 10px; }
        .change-team-area { margin-top: 30px; padding-top: 20px; border-top: 2px solid rgba(255,255,255,0.3); }
        .nickname-input { font-size: 18px; width: 250px; }
        .action-buttons { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        
        .image-round-container { text-align: center; }
        .round-image { max-width: 80%; max-height: 300px; border-radius: 15px; margin: 20px auto; display: block; }
        .timer { font-size: 48px; font-weight: bold; margin: 20px; color: #ffaa00; }
        .answer-input { width: 80%; font-size: 18px; text-align: center; }
        .admin-answers-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: rgba(0,0,0,0.5); }
        .admin-answers-table th, .admin-answers-table td { border: 1px solid #fff; padding: 8px; text-align: left; }
        .quiz-option-btn { display: block; width: 80%; margin: 10px auto; background: #ff4757; border: none; border-radius: 40px; color: white; font-size: 18px; padding: 12px; }
        .quiz-option-btn:hover { background: #ff6b81; }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>🎌 Аниме викторина | 8 раундов</h1>
    
    <!-- Экран входа -->
    <div id="loginScreen">
        <h2>Вход в игру</h2>
        <input type="text" id="nickname" class="nickname-input" placeholder="Твой никнейм" maxlength="20">
        <div class="team-buttons" id="loginTeamButtons">
            <button class="team-btn" data-team="0">Команда 1</button>
            <button class="team-btn" data-team="1">Команда 2</button>
            <button class="team-btn" data-team="2">Команда 3</button>
            <button class="team-btn" data-team="3">Команда 4</button>
        </div>
        <div class="action-buttons">
            <button id="joinBtn">Присоединиться</button>
            <button id="adminLoginFromStartBtn">Войти как администратор</button>
        </div>
        <div id="errorDisplay" class="error-message" style="display:none;"></div>
    </div>

    <!-- Экран игры -->
    <div id="gameScreen" class="hidden">
        <div id="playerInfo"></div>
        <div id="waitingScreen">
            <div class="waiting">⏳ Ожидание начала игры...</div>
            <div id="teamsStatus"></div>
            <div id="changeTeamBlock" class="change-team-area hidden">
                <h3>Выберите команду (можно менять до старта)</h3>
                <div class="team-buttons" id="changeTeamButtons">
                    <button class="team-btn" data-team="0">Команда 1</button>
                    <button class="team-btn" data-team="1">Команда 2</button>
                    <button class="team-btn" data-team="2">Команда 3</button>
                    <button class="team-btn" data-team="3">Команда 4</button>
                </div>
                <div id="changeTeamMsg"></div>
                <button id="becomeAdminBtn" style="background: #3498db;">👑 Стать администратором</button>
            </div>
        </div>
        <div id="quizScreen" class="hidden">
            <div id="roundContent"></div>
        </div>
        <div id="resultScreen" class="hidden">
            <h2>Игра окончена!</h2>
            <div id="finalResults"></div>
        </div>
    </div>

    <!-- Панель администратора -->
    <div id="adminPanel" class="hidden admin-panel">
        <h2>🔧 Панель администратора</h2>
        <div id="adminTeamsStatus"></div>
        <div id="adminRoundControls">
            <button id="startGameBtn">🚀 СТАРТ ИГРЫ (раунд 1)</button>
            <button id="nextRoundBtn" class="hidden">➡️ Следующий раунд</button>
            <button id="resetGameBtn">🔄 Сбросить игру</button>
        </div>
        <div id="adminAnswersPanel"></div>
    </div>
</div>

<script>
    // ---------- КОНФИГ FIREBASE ----------
    const firebaseConfig = {
        apiKey: "AIzaSyCGkWhrIEg-WPusS2QqTILVWCht-WXS4ug",
        authDomain: "anime-database-7d48e.firebaseapp.com",
        databaseURL: "https://anime-database-7d48e-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "anime-database-7d48e",
        storageBucket: "anime-database-7d48e.firebasestorage.app",
        messagingSenderId: "143822737117",
        appId: "1:143822737117:web:5195d511264dbb80175534"
    };
    let db;
    try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        console.log("Firebase инициализирован");
    } catch(e) { console.error(e); }

    // ---------- ДАННЫЕ РАУНДОВ (8 штук) ----------
    const rounds = [
        { // Раунд 1: угадай по картинке
            type: "image",
            name: "Раунд 1: Угадай аниме по картинке",
            images: [
                { url: "https://via.placeholder.com/400x300?text=Аниме+1", points: 4 },   // ЗАМЕНИТЕ НА СВОИ URL
                { url: "https://via.placeholder.com/400x300?text=Аниме+2", points: 3 },
                { url: "https://via.placeholder.com/400x300?text=Аниме+3", points: 2 },
                { url: "https://via.placeholder.com/400x300?text=Аниме+4", points: 1 }
            ]
        },
        { type: "quiz", name: "Раунд 2", question: "Кто главный герой «Наруто»?", options: ["Саске", "Наруто", "Какаши", "Сакура"], correct: 1, points: 2 },
        { type: "quiz", name: "Раунд 3", question: "Техника Гоку из «Драгон Болл»?", options: ["Расенган", "Камехамеха", "Гетсуга", "Реактор"], correct: 1, points: 2 },
        { type: "quiz", name: "Раунд 4", question: "Где появляется Леви Аккерман?", options: ["Ванпанчмен", "Токийский гуль", "Атака титанов", "Моя геройская академия"], correct: 2, points: 2 },
        { type: "quiz", name: "Раунд 5", question: "Автор «Ван Пис»?", options: ["Ода", "Кисимото", "Тогаси", "Кубо"], correct: 0, points: 2 },
        { type: "quiz", name: "Раунд 6", question: "Название меча у Танджиро из «Клинка, рассекающего демонов»?", options: ["Ничирин", "Солнечный", "Танджиро", "Хашира"], correct: 0, points: 2 },
        { type: "quiz", name: "Раунд 7", question: "Как звали друга Наруто, который стал Хокаге?", options: ["Шикамару", "Киба", "Наруто", "Конокамару"], correct: 2, points: 2 },
        { type: "quiz", name: "Раунд 8", question: "Кто создал «Атаку титанов»?", options: ["Ода", "Исаяма", "Араки", "Танака"], correct: 1, points: 2 }
    ];

    let currentRound = 0;           // 0-индекс
    let gameActive = false;          // активна ли игра (раунд в процессе)
    let roundInProgress = false;     // флаг для таймера
    let currentUser = null;
    let timerInterval = null;

    // Состояние для image-раунда у игрока
    let imageStep = 0;
    let answered = false;
    let answerGivenAtStep = -1;
    let userAnswerText = "";

    // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----------
    function showError(msg) {
        const errDiv = document.getElementById('errorDisplay');
        if(errDiv) { errDiv.innerText = msg; errDiv.style.display = 'block'; setTimeout(() => errDiv.style.display = 'none', 5000); }
    }

    function awardPoints(playerId, delta) {
        db.ref('players/' + playerId).transaction((player) => {
            if(player) {
                player.score = (player.score || 0) + delta;
            }
            return player;
        });
    }

    // Обновление отображения команд (для всех)
    function updateTeamsDisplay(players) {
        const teams = [[], [], [], []];
        for (let id in players) {
            const p = players[id];
            if (p && p.team >= 0 && p.team < 4 && !p.isAdmin) teams[p.team].push(p.nickname);
        }
        const container = document.getElementById('teamsStatus');
        if (container) {
            container.innerHTML = '<h3>Состав команд:</h3>' + teams.map((t, i) => `<div class="team-display"><h3>Команда ${i+1}</h3><div>${t.join(', ') || 'пусто'}</div></div>`).join('');
        }
    }

    function updateAdminTeamsDisplay(players) {
        const teams = [[], [], [], []];
        for (let id in players) {
            const p = players[id];
            if (p && p.team >= 0 && p.team < 4 && !p.isAdmin) teams[p.team].push(p.nickname);
        }
        const container = document.getElementById('adminTeamsStatus');
        if (container) {
            container.innerHTML = '<h3>Игроки по командам:</h3>' + teams.map((t, i) => `<div class="team-display"><strong>Команда ${i+1}</strong>: ${t.join(', ') || 'нет'}</div>`).join('');
        }
    }

    // ---------- ЛОГИКА РАУНДОВ ДЛЯ ИГРОКА ----------
    function showRound(roundIndex) {
        const round = rounds[roundIndex];
        const container = document.getElementById('roundContent');
        if(!container) return;
        if(round.type === "image") {
            imageStep = 0;
            answered = false;
            answerGivenAtStep = -1;
            userAnswerText = "";
            if(timerInterval) clearInterval(timerInterval);
            startImageRound();
        } else {
            // Обычная викторина
            container.innerHTML = `
                <div class="question-block">
                    <h2>${round.name}</h2>
                    <div style="font-size:24px; margin:20px;">${round.question}</div>
                    <div id="quizOptions"></div>
                </div>
            `;
            const optsDiv = document.getElementById('quizOptions');
            round.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.className = "quiz-option-btn";
                btn.onclick = () => answerQuiz(idx);
                optsDiv.appendChild(btn);
            });
        }
    }

    function startImageRound() {
        const round = rounds[currentRound];
        const container = document.getElementById('roundContent');
        if(!container) return;
        if(imageStep >= round.images.length) {
            finishRound();
            return;
        }
        const img = round.images[imageStep];
        let timeLeft = 8;
        container.innerHTML = `
            <div class="image-round-container">
                <h2>${round.name}</h2>
                <div class="timer" id="timer">${timeLeft}</div>
                <img src="${img.url}" class="round-image" id="roundImage">
                <div>
                    <input type="text" id="answerInput" class="answer-input" placeholder="Введите название аниме" ${answered ? 'disabled' : ''}>
                    <button id="submitAnswerBtn" ${answered ? 'disabled' : ''}>Ответить</button>
                </div>
                <p>Картинка ${imageStep+1} из ${round.images.length}</p>
            </div>
        `;
        if(answered) {
            document.getElementById('answerInput').disabled = true;
            document.getElementById('submitAnswerBtn').disabled = true;
        } else {
            document.getElementById('submitAnswerBtn').onclick = () => {
                if(answered) return;
                const answer = document.getElementById('answerInput').value.trim();
                if(answer === "") { alert("Введите ответ"); return; }
                answered = true;
                answerGivenAtStep = imageStep;
                userAnswerText = answer;
                // Сохраняем ответ в Firebase для админа
                if(currentUser && !currentUser.isAdmin) {
                    const roundAnsRef = db.ref('players/' + currentUser.id + '/roundAnswers/' + currentRound);
                    roundAnsRef.set({
                        answered: true,
                        step: imageStep,
                        answer: answer,
                        timestamp: Date.now()
                    });
                }
                document.getElementById('answerInput').disabled = true;
                document.getElementById('submitAnswerBtn').disabled = true;
            };
        }
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if(!gameActive || !roundInProgress) {
                clearInterval(timerInterval);
                return;
            }
            timeLeft--;
            const timerDiv = document.getElementById('timer');
            if(timerDiv) timerDiv.innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                if(!answered) {
                    // Не ответил - ничего не меняется
                }
                imageStep++;
                if(imageStep < round.images.length) {
                    startImageRound();
                } else {
                    finishRound();
                }
            }
        }, 1000);
    }

    function answerQuiz(selectedIdx) {
        if(!gameActive) return;
        const round = rounds[currentRound];
        const isCorrect = (selectedIdx === round.correct);
        let delta = isCorrect ? round.points : 0;
        if(delta !== 0) {
            awardPoints(currentUser.id, delta);
            alert(`✅ Правильно! +${delta} баллов`);
        } else {
            alert(`❌ Неправильно. Правильный ответ: ${round.options[round.correct]}`);
        }
        finishRound();
    }

    function finishRound() {
        if(timerInterval) clearInterval(timerInterval);
        roundInProgress = false;
        gameActive = false;
        // Обновляем состояние в Firebase
        db.ref('gameState').set({ active: false, currentRound: currentRound, roundFinished: true });
        document.getElementById('roundContent').innerHTML = `<div class="waiting">⏳ Раунд завершён. Админ проверяет ответы и начнёт следующий раунд.</div>`;
        if(currentUser && currentUser.isAdmin) {
            document.getElementById('nextRoundBtn').classList.remove('hidden');
            // Обновить таблицу ответов админа
            listenAllPlayersAnswers();
        }
    }

    // Админ: отображение ответов игроков для image-раунда
    function listenAllPlayersAnswers() {
        if(!db || !currentUser?.isAdmin) return;
        db.ref('players').on('value', (snap) => {
            const players = snap.val() || {};
            updateAdminAnswersTable(players);
        });
    }

    function updateAdminAnswersTable(players) {
        const container = document.getElementById('adminAnswersPanel');
        if(!container) return;
        if(!gameActive && currentRound < rounds.length && rounds[currentRound].type === "image") {
            // Показываем таблицу ответов только если раунд завершён и это image-раунд
            const round = rounds[currentRound];
            let html = `<h3>Ответы игроков на ${round.name}</h3>`;
            html += `<table class="admin-answers-table">`;
            html += `<tr><th>Игрок</th><th>Команда</th><th>Ответ дан на картинке №</th><th>Текст ответа</th><th>Действие</th></tr>`;
            let anyAnswer = false;
            for(let id in players) {
                const p = players[id];
                if(p.isAdmin || !p.nickname) continue;
                const ans = p.roundAnswers && p.roundAnswers[currentRound];
                if(ans && ans.answered) {
                    anyAnswer = true;
                    html += `<tr>
                        <td>${p.nickname}</td>
                        <td>Команда ${p.team+1}</td>
                        <td>${ans.step+1}</td>
                        <td>${ans.answer}</td>
                        <td>
                            <button class="mark-correct" data-player="${id}" data-step="${ans.step}">✅ Правильно (+${round.images[ans.step].points})</button>
                            <button class="mark-wrong" data-player="${id}" data-step="${ans.step}">❌ Неправильно (-1)</button>
                        </td>
                    </tr>`;
                }
            }
            if(!anyAnswer) html += `<tr><td colspan="5">Нет ответов</td></tr>`;
            html += `</table>`;
            container.innerHTML = html;
            // Привязываем события
            document.querySelectorAll('.mark-correct').forEach(btn => {
                btn.addEventListener('click', () => {
                    const playerId = btn.getAttribute('data-player');
                    const step = parseInt(btn.getAttribute('data-step'));
                    const points = rounds[currentRound].images[step].points;
                    awardPoints(playerId, points);
                    db.ref('players/' + playerId + '/roundAnswers/' + currentRound).remove();
                    btn.parentElement.parentElement.remove();
                });
            });
            document.querySelectorAll('.mark-wrong').forEach(btn => {
                btn.addEventListener('click', () => {
                    const playerId = btn.getAttribute('data-player');
                    awardPoints(playerId, -1);
                    db.ref('players/' + playerId + '/roundAnswers/' + currentRound).remove();
                    btn.parentElement.parentElement.remove();
                });
            });
        } else if(rounds[currentRound] && rounds[currentRound].type !== "image") {
            container.innerHTML = `<p>Раунд ${rounds[currentRound].name} - автоматическая проверка (админ не требуется)</p>`;
        } else {
            container.innerHTML = "";
        }
    }

    // Запуск раунда админом
    function startRound(roundIndex) {
        if(roundIndex >= rounds.length) {
            alert("Игра завершена!");
            showFinalResults();
            return;
        }
        currentRound = roundIndex;
        gameActive = true;
        roundInProgress = true;
        db.ref('gameState').set({ active: true, currentRound: roundIndex, roundFinished: false });
        // Очистить предыдущие ответы для этого раунда
        db.ref('players').once('value', (snap) => {
            const players = snap.val();
            for(let id in players) {
                if(!players[id].isAdmin) {
                    db.ref('players/' + id + '/roundAnswers/' + roundIndex).remove();
                }
            }
        });
        showRound(roundIndex);
        if(currentUser && currentUser.isAdmin) {
            document.getElementById('nextRoundBtn').classList.add('hidden');
            listenAllPlayersAnswers();
        }
    }

    // Финальные результаты
    function showFinalResults() {
        document.getElementById('waitingScreen').classList.add('hidden');
        document.getElementById('quizScreen').classList.add('hidden');
        document.getElementById('resultScreen').classList.remove('hidden');
        if(db) {
            db.ref('players').once('value', (snap) => {
                const players = snap.val() || {};
                let teamsScores = [0,0,0,0];
                for(let id in players) {
                    let p = players[id];
                    if(p && p.team >= 0 && p.team < 4 && !p.isAdmin) {
                        teamsScores[p.team] += (p.score || 0);
                    }
                }
                let html = '<h3>Итоговые результаты команд:</h3>';
                for(let i=0; i<4; i++) {
                    html += `<div class="team-display">Команда ${i+1}: ${teamsScores[i]} очков</div>`;
                }
                document.getElementById('finalResults').innerHTML = html;
            });
        }
    }

    // ---------- ЛОГИН, РЕГИСТРАЦИЯ, АДМИНКА (как в предыдущей версии) ----------
    function joinGame(nickname, team) {
        if (!db) { showError("База данных не инициализирована"); return; }
        const userId = nickname + "_" + Date.now();
        currentUser = { nickname, team: parseInt(team), isAdmin: false, id: userId };
        db.ref('players/' + userId).set({
            nickname: nickname,
            team: parseInt(team),
            score: 0,
            isAdmin: false
        }).then(() => {
            localStorage.setItem('quizUser', JSON.stringify({ nickname, team: parseInt(team), id: userId, isAdmin: false }));
            showGameScreen();
        }).catch(err => { console.error(err); showError("Ошибка: " + err.message); });
    }

    function adminLogin(password) {
        if (password === "admin123") {
            const adminId = "admin_" + Date.now();
            currentUser = { nickname: "Админ", team: -1, isAdmin: true, id: adminId };
            localStorage.setItem('quizUser', JSON.stringify({ nickname: "Админ", team: -1, id: adminId, isAdmin: true }));
            showGameScreen();
            document.getElementById('adminPanel').classList.remove('hidden');
            if (db) {
                db.ref('gameState').on('value', (snap) => {
                    const state = snap.val();
                    if (state && state.active) {
                        gameActive = true;
                        currentRound = state.currentRound;
                        roundInProgress = true;
                        if (currentRound < rounds.length) showRound(currentRound);
                        else showFinalResults();
                    } else {
                        gameActive = false;
                        roundInProgress = false;
                        showWaitingScreen();
                        if(currentRound < rounds.length && rounds[currentRound].type === "image") {
                            listenAllPlayersAnswers();
                        }
                    }
                });
                listenPlayersForAdmin();
            }
        } else {
            alert("Неверный пароль администратора");
        }
    }

    function listenPlayersForAdmin() {
        if(!db) return;
        db.ref('players').on('value', (snap) => {
            const players = snap.val() || {};
            updateAdminTeamsDisplay(players);
        });
    }

    function showGameScreen() {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('gameScreen').classList.remove('hidden');
        document.getElementById('playerInfo').innerHTML = `Вы: ${currentUser.nickname} ${currentUser.isAdmin ? '(админ)' : ''}`;
        if (!currentUser.isAdmin && db) {
            listenGameStateForPlayer();
            listenPlayersForPlayer();
        } else if (currentUser.isAdmin) {
            document.getElementById('changeTeamBlock')?.classList.add('hidden');
        }
    }

    function listenGameStateForPlayer() {
        if(!db) return;
        db.ref('gameState').on('value', (snap) => {
            const state = snap.val();
            if (state && state.active) {
                gameActive = true;
                roundInProgress = true;
                currentRound = state.currentRound;
                if (currentRound < rounds.length) {
                    showRound(currentRound);
                    document.getElementById('quizScreen').classList.remove('hidden');
                    document.getElementById('waitingScreen').classList.add('hidden');
                } else {
                    showFinalResults();
                }
            } else {
                gameActive = false;
                roundInProgress = false;
                showWaitingScreen();
            }
        });
    }

    function listenPlayersForPlayer() {
        if(!db) return;
        db.ref('players').on('value', (snap) => {
            const players = snap.val() || {};
            updateTeamsDisplay(players);
        });
    }

    function showWaitingScreen() {
        document.getElementById('waitingScreen').classList.remove('hidden');
        document.getElementById('quizScreen').classList.add('hidden');
        document.getElementById('resultScreen').classList.add('hidden');
        if (currentUser && !currentUser.isAdmin) {
            const changeBlock = document.getElementById('changeTeamBlock');
            if (changeBlock) changeBlock.classList.remove('hidden');
            // подсветка текущей команды
            const btns = document.querySelectorAll('#changeTeamButtons .team-btn');
            btns.forEach(btn => {
                if(parseInt(btn.getAttribute('data-team')) === currentUser.team) btn.classList.add('selected');
                else btn.classList.remove('selected');
            });
        }
    }

    function changeTeam(newTeam) {
        if (!db) return;
        if (gameActive) {
            document.getElementById('changeTeamMsg').innerHTML = "❌ Нельзя сменить команду после начала игры!";
            setTimeout(() => document.getElementById('changeTeamMsg').innerHTML = "", 3000);
            return;
        }
        if (!currentUser || currentUser.isAdmin) return;
        const teamNum = parseInt(newTeam);
        db.ref('players/' + currentUser.id).update({ team: teamNum }).then(() => {
            currentUser.team = teamNum;
            const saved = localStorage.getItem('quizUser');
            if (saved) {
                let u = JSON.parse(saved);
                u.team = teamNum;
                localStorage.setItem('quizUser', JSON.stringify(u));
            }
            document.getElementById('changeTeamMsg').innerHTML = "✅ Команда изменена!";
            setTimeout(() => document.getElementById('changeTeamMsg').innerHTML = "", 2000);
        }).catch(err => { console.error(err); });
    }

    // ---------- ОБРАБОТЧИКИ ИНТЕРФЕЙСА ----------
    document.getElementById('joinBtn')?.addEventListener('click', () => {
        const nick = document.getElementById('nickname').value.trim();
        const selectedTeam = document.querySelector('#loginTeamButtons .team-btn.selected')?.getAttribute('data-team');
        if (!nick) { alert("Введи никнейм"); return; }
        if (selectedTeam === undefined) { alert("Выберите команду"); return; }
        joinGame(nick, selectedTeam);
    });

    document.getElementById('adminLoginFromStartBtn')?.addEventListener('click', () => {
        const pwd = prompt("Введите пароль администратора:");
        if (pwd === "admin123") adminLogin(pwd);
        else if(pwd !== null) alert("Неверный пароль");
    });

    document.getElementById('startGameBtn')?.addEventListener('click', () => {
        if (currentUser && currentUser.isAdmin) startRound(0);
    });

    document.getElementById('nextRoundBtn')?.addEventListener('click', () => {
        if (currentUser && currentUser.isAdmin) {
            if (currentRound + 1 < rounds.length) startRound(currentRound + 1);
            else showFinalResults();
        }
    });

    document.getElementById('resetGameBtn')?.addEventListener('click', () => {
        if (currentUser && currentUser.isAdmin && confirm("Сбросить игру? Все данные удалятся.")) {
            db.ref('gameState').set({ active: false, currentRound: 0, roundFinished: false });
            db.ref('players').set(null);
            localStorage.removeItem('quizUser');
            location.reload();
        }
    });

    document.getElementById('becomeAdminBtn')?.addEventListener('click', () => {
        const pwd = prompt("Введите пароль администратора:");
        if (pwd === "admin123") {
            if (currentUser && !currentUser.isAdmin && db) db.ref('players/' + currentUser.id).remove();
            adminLogin(pwd);
        } else if(pwd !== null) alert("Неверный пароль");
    });

    // Выбор команды на экране входа
    document.querySelectorAll('#loginTeamButtons .team-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('#loginTeamButtons .team-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        });
    });
    // Выбор команды в блоке смены
    document.querySelectorAll('#changeTeamButtons .team-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            if (!gameActive && currentUser && !currentUser.isAdmin) {
                changeTeam(btn.getAttribute('data-team'));
                document.querySelectorAll('#changeTeamButtons .team-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
            } else {
                document.getElementById('changeTeamMsg').innerHTML = "Нельзя сменить команду после старта";
                setTimeout(() => document.getElementById('changeTeamMsg').innerHTML = "", 2000);
            }
        });
    });

    // Восстановление сессии
    const saved = localStorage.getItem('quizUser');
    if (saved) {
        try {
            const u = JSON.parse(saved);
            if (u.isAdmin) {
                currentUser = u;
                showGameScreen();
                document.getElementById('adminPanel').classList.remove('hidden');
                if (db) {
                    listenPlayersForAdmin();
                    db.ref('gameState').on('value', (snap) => {
                        const state = snap.val();
                        if (state && state.active) {
                            gameActive = true;
                            currentRound = state.currentRound;
                            if (currentRound < rounds.length) showRound(currentRound);
                            else showFinalResults();
                        } else {
                            gameActive = false;
                            showWaitingScreen();
                            if (currentRound < rounds.length && rounds[currentRound]?.type === "image") listenAllPlayersAnswers();
                        }
                    });
                }
            } else {
                currentUser = u;
                if (db) {
                    db.ref('players/' + u.id).once('value', (snap) => {
                        if (!snap.exists()) {
                            db.ref('players/' + u.id).set({ nickname: u.nickname, team: u.team, score: 0, isAdmin: false });
                        }
                    });
                    showGameScreen();
                    listenGameStateForPlayer();
                    listenPlayersForPlayer();
                }
            }
        } catch(e) { console.error(e); }
    }
</script>
</body>
</html>
