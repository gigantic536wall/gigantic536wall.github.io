<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аниме викторина | 8 раундов + выбор раунда</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        input, button, select {
            padding: 12px 20px;
            margin: 10px;
            border-radius: 40px;
            border: none;
            font-size: 16px;
        }
        button {
            background: #ff4757;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #ff6b81; transform: scale(1.02); }
        select {
            background: #2c3e50;
            color: white;
            font-weight: bold;
        }
        .team-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        .team-btn {
            width: 160px;
            padding: 20px 10px;
            font-size: 20px;
            border-radius: 60px;
            transition: 0.2s;
        }
        .team-btn[data-team="0"] { background: #3498db; }
        .team-btn[data-team="1"] { background: #2ecc71; }
        .team-btn[data-team="2"] { background: #f39c12; }
        .team-btn[data-team="3"] { background: #9b59b6; }
        .team-btn.selected { background: #ff4757; box-shadow: 0 0 15px rgba(255,71,87,0.5); transform: scale(1.02); }
        .admin-panel {
            border-top: 2px solid #ff4757;
            margin-top: 20px;
            padding-top: 20px;
        }
        .team-display {
            display: inline-block;
            background: rgba(0,0,0,0.5);
            margin: 10px;
            padding: 10px;
            border-radius: 15px;
            min-width: 150px;
            vertical-align: top;
        }
        .waiting { font-size: 24px; color: #ffaa00; }
        .pause-timer { font-size: 36px; color: #ffaa00; margin: 20px; }
        .question-block { background: rgba(0,0,0,0.6); border-radius: 20px; padding: 20px; margin-top: 20px; }
        .hidden { display: none; }
        .error-message { color: #ff8888; background: #440000; padding: 10px; border-radius: 10px; margin: 10px; }
        .change-team-area { margin-top: 30px; padding-top: 20px; border-top: 2px solid rgba(255,255,255,0.3); }
        .nickname-input { font-size: 18px; width: 250px; }
        .action-buttons { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .image-round-container { text-align: center; }
        .round-image { max-width: 80%; max-height: 300px; border-radius: 15px; margin: 20px auto; display: block; }
        .timer { font-size: 48px; font-weight: bold; margin: 20px; color: #ffaa00; }
        .answer-input { width: 80%; font-size: 18px; text-align: center; }
        .admin-answers-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: rgba(0,0,0,0.5); }
        .admin-answers-table th, .admin-answers-table td { border: 1px solid #fff; padding: 8px; text-align: left; }
        .quiz-option-btn { display: block; width: 80%; margin: 10px auto; background: #ff4757; border: none; border-radius: 40px; color: white; font-size: 18px; padding: 12px; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: #1a1a2e; margin: 5% auto; padding: 20px; width: 80%; max-height: 80%; overflow-y: auto; border-radius: 20px; color: white; }
        .close-modal { float: right; cursor: pointer; font-size: 28px; }
        .answer-item { border-bottom: 1px solid #ccc; margin: 15px 0; padding: 10px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .answer-item img { width: 150px; border-radius: 10px; }
        .clear-players-btn { background: #e67e22; margin-left: 10px; }
        .clear-players-btn:hover { background: #f39c12; }
        .skip-pause-btn { background: #2ecc71; }
        .skip-pause-btn:hover { background: #27ae60; }
        .answers-review-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        .answers-review-container img {
            max-width: 200px;
            max-height: 150px;
            border-radius: 15px;
        }
        .correct-answer-big {
            font-size: 36px;
            color: #2ecc71;
            margin: 30px;
            font-weight: bold;
        }
        .audio-controls {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 15px;
            padding: 10px 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 40px;
            margin-bottom: 20px;
        }
        .audio-icon {
            font-size: 24px;
            cursor: pointer;
            user-select: none;
        }
        .volume-slider {
            width: 120px;
            cursor: pointer;
        }
        .test-sound-btn {
            background: #2c3e50;
            padding: 8px 16px;
            font-size: 14px;
        }
        .video-player {
            max-width: 80%;
            max-height: 300px;
            border-radius: 15px;
            margin: 20px auto;
            display: block;
            background: black;
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="audio-controls">
        <span class="audio-icon" id="muteIcon">🔊</span>
        <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.5">
        <button id="testSoundBtn" class="test-sound-btn">🔔 Тест</button>
    </div>
    <h1>🎌 Аниме викторина | 8 раундов × 10 вопросов</h1>
    
    <div id="loginScreen">
        <h2>Вход в игру</h2>
        <input type="text" id="nickname" class="nickname-input" placeholder="Твой никнейм" maxlength="20">
        <div class="team-buttons" id="loginTeamButtons">
            <button class="team-btn" data-team="0">Команда 1</button>
            <button class="team-btn" data-team="1">Команда 2</button>
            <button class="team-btn" data-team="2">Команда 3</button>
            <button class="team-btn" data-team="3">Команда 4</button>
        </div>
        <div class="action-buttons">
            <button id="joinBtn">Присоединиться</button>
            <button id="adminLoginFromStartBtn">Войти как администратор</button>
        </div>
        <div id="errorDisplay" class="error-message" style="display:none;"></div>
    </div>

    <div id="gameScreen" class="hidden">
        <div id="playerInfo"></div>
        <div id="waitingScreen">
            <div class="waiting">⏳ Ожидание начала игры...</div>
            <div id="teamsStatus"></div>
            <div id="changeTeamBlock" class="change-team-area">
                <h3>Выберите команду (можно менять до старта)</h3>
                <div class="team-buttons" id="changeTeamButtons">
                    <button class="team-btn" data-team="0">Команда 1</button>
                    <button class="team-btn" data-team="1">Команда 2</button>
                    <button class="team-btn" data-team="2">Команда 3</button>
                    <button class="team-btn" data-team="3">Команда 4</button>
                </div>
                <div id="changeTeamMsg"></div>
                <button id="becomeAdminBtn" style="background: #3498db;">👑 Стать администратором</button>
            </div>
        </div>
        <div id="pauseScreen" class="hidden">
            <div class="waiting" id="pauseTitle">⏸️ Пауза</div>
            <div class="pause-timer" id="pauseTimer">15</div>
            <div id="pauseMessage"></div>
            <button id="skipPauseBtn" class="skip-pause-btn hidden">⏩ Пропустить паузу</button>
        </div>
        <div id="quizScreen" class="hidden">
            <div id="roundContent"></div>
        </div>
        <div id="answersReviewScreen" class="hidden">
            <div id="answersReviewContent"></div>
        </div>
        <div id="resultScreen" class="hidden">
            <h2>Игра окончена!</h2>
            <div id="finalResults"></div>
        </div>
    </div>

    <div id="adminPanel" class="hidden admin-panel">
        <h2>🔧 Панель администратора</h2>
        <div id="adminTeamsStatus"></div>
        <div id="adminRoundControls">
            <label for="roundSelect">Выберите раунд для старта:</label>
            <select id="roundSelect">
                <!-- Заполняется динамически -->
            </select>
            <button id="startSelectedRoundBtn">🚀 СТАРТ ВЫБРАННОГО РАУНДА</button>
            <button id="nextRoundBtn" class="hidden">➡️ Следующий раунд</button>
            <button id="showAnswersBtn" class="hidden">📋 Показать ответы раунда (слайд-шоу)</button>
            <button id="clearPlayersBtn" class="clear-players-btn">🧹 Очистить всех игроков</button>
            <button id="resetGameBtn">🔄 Сбросить игру</button>
            <button id="globalPauseBtn" class="hidden">⏸️ Поставить на паузу</button>
            <button id="globalResumeBtn" class="hidden">▶️ Снять с паузы</button>
        </div>
        <div id="adminAnswersPanel"></div>
    </div>
</div>

<script>
    // ==================== КОНФИГ FIREBASE ====================
    const DB_URL = "https://anime-database-7d48e-default-rtdb.europe-west1.firebasedatabase.app";
    async function restGet(p) { const r=await fetch(`${DB_URL}/${p}.json`); if(!r.ok) throw new Error(`GET ${p} ${r.status}`); return r.json(); }
    async function restPut(p,d) { const r=await fetch(`${DB_URL}/${p}.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}); if(!r.ok) throw new Error(`PUT ${p} ${r.status}`); return r.json(); }
    async function restPatch(p,d) { const r=await fetch(`${DB_URL}/${p}.json`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}); if(!r.ok) throw new Error(`PATCH ${p} ${r.status}`); return r.json(); }
    async function restDelete(p) { const r=await fetch(`${DB_URL}/${p}.json`,{method:'DELETE'}); if(!r.ok) throw new Error(`DELETE ${p} ${r.status}`); return r.json(); }

    // ========== АУДИО ПЛЕЕР ==========
    const bgMusic = new Audio('music/background.mp3');
    bgMusic.loop = true;
    bgMusic.volume = 0.5;
    let musicEnabled = true;

    function initAudio() {
        if (bgMusic.paused) {
            bgMusic.play().catch(e => console.log("Автовоспроизведение заблокировано, ждём клика"));
        }
    }

    const muteIcon = document.getElementById('muteIcon');
    const volumeSlider = document.getElementById('volumeSlider');
    const testSoundBtn = document.getElementById('testSoundBtn');

    volumeSlider.addEventListener('input', (e) => {
        const vol = parseFloat(e.target.value);
        bgMusic.volume = vol;
        updateMuteIcon(vol);
    });

    function updateMuteIcon(vol) {
        if (vol === 0) muteIcon.textContent = '🔇';
        else if (vol < 0.3) muteIcon.textContent = '🔈';
        else if (vol < 0.7) muteIcon.textContent = '🔉';
        else muteIcon.textContent = '🔊';
    }

    muteIcon.addEventListener('click', () => {
        if (bgMusic.volume > 0) {
            bgMusic.volume = 0;
            volumeSlider.value = 0;
            muteIcon.textContent = '🔇';
        } else {
            const newVol = 0.5;
            bgMusic.volume = newVol;
            volumeSlider.value = newVol;
            updateMuteIcon(newVol);
        }
    });

    testSoundBtn.addEventListener('click', () => {
        const testAudio = new Audio('music/тестауд.mp3');
        testAudio.volume = volumeSlider.value;
        testAudio.play();
    });

    document.body.addEventListener('click', function startMusicOnce() {
        initAudio();
        document.body.removeEventListener('click', startMusicOnce);
    }, { once: true });

    // ==================== ДАННЫЕ ИГРЫ ====================
    const roundsData = [
        { 
            type: "image_sequence", 
            name: "Раунд 1: Угадай аниме по картинке", 
            questions: [
                { images: ["images/image1.png", "images/image2.png", "images/image3.png", "images/image4.png"], correctAnswer: "Реинкарнация безработного" },
                { images: ["images/image1маг.png", "images/image2маг.png", "images/image3маг.png", "images/image4маг.png"], correctAnswer: "Магическая битва " },
                { images: ["images/image1невест.png", "images/image2невест.png", "images/image3невест.png", "images/image4невест.png"], correctAnswer: "Пять невест" },
                { images: ["images/images1джо.jpg", "images/images2джо.jpg", "images/images3джо.jpg", "images/images4джо.jpg"], correctAnswer: "ДжоДжо" },
                { images: ["images/image1angel.png", "images/image2angel.png", "images/image3angel.png", "images/image4angel.png"], correctAnswer: "Ангел по соседству меня балует" },
                { images: ["images/image1грех.png", "images/image2грех.png", "images/image3грех.png", "images/image4грех.png"], correctAnswer: "Семь смертных грехов" },
                { images: ["images/image1лейм.png", "images/image2лейм.png", "images/image3лейм.png", "images/image4лейм.png"], correctAnswer: "Эксперименты Лэйн" },
                { images: ["images/image1ток.png", "images/image2ток.png", "images/image3ток.png", "images/image4ток.png"], correctAnswer: "Токийский гуль" },
                { images: ["images/image1цвет.png", "images/image2цвет.png", "images/image3цвет.png", "images/image4цвет.png"], correctAnswer: "Благоухающий цветок расцветает с достоинством" },
                { images: ["images/image1тит.png", "images/image2тит.png", "images/image3тит.png", "images/image4тит.png"], correctAnswer: "Атака титанов" }
            ] 
        },
        { type: "quiz", name: "Раунд 2: Общие знания", questions: generateQuizQuestions(2) },
        { 
            type: "video", 
            name: "Раунд 3: Угадай аниме по отрывку опенинга", 
            questions: [
                { video: "videos/op1.mp4", correctAnswer: "Название аниме 1" },
                { video: "videos/op2.mp4", correctAnswer: "Название аниме 2" },
                { video: "videos/op3.mp4", correctAnswer: "Название аниме 3" },
                { video: "videos/op4.mp4", correctAnswer: "Название аниме 4" },
                { video: "videos/op5.mp4", correctAnswer: "Название аниме 5" },
                { video: "videos/op6.mp4", correctAnswer: "Название аниме 6" },
                { video: "videos/op7.mp4", correctAnswer: "Название аниме 7" },
                { video: "videos/op8.mp4", correctAnswer: "Название аниме 8" },
                { video: "videos/op9.mp4", correctAnswer: "Название аниме 9" },
                { video: "videos/op10.mp4", correctAnswer: "Название аниме 10" }
            ],
            pauseDuration: 10 // секунд между вопросами
        },
        ...Array.from({length:5},(_,i)=> ({ type:"quiz", name:`Раунд ${i+4}: ${["Персонажи","Сюжеты","Манга","Студии","Озвучка"][i]}`, questions: generateQuizQuestions(i+4) }))
    ];

    function generateQuizQuestions(roundNum){ 
        return Array.from({length:10},(_,i)=>({ 
            text:`Вопрос ${i+1} раунда ${roundNum}: Назовите аниме, где главного героя зовут Гоку?`, 
            options:["Наруто","Драгон Болл","Ван Пис","Блич"], 
            correct:1, 
            points:2 
        })); 
    }

    // Заполняем выпадающий список раундов
    function populateRoundSelect() {
        const select = document.getElementById('roundSelect');
        if (!select) return;
        select.innerHTML = '';
        roundsData.forEach((round, idx) => {
            const option = document.createElement('option');
            option.value = idx;
            option.textContent = `${idx+1}. ${round.name}`;
            select.appendChild(option);
        });
    }

    // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
    let currentRound = 0, currentQuestionIdx = 0, gameActive = false, roundInProgress = false, pauseActive = false;
    let currentUser = null, timerInterval = null, currentQuizTimer = null, pauseInterval = null;
    let imageStep = 0, answered = false, answerGivenAtStep = -1, userAnswerText = "", currentQuestionObj = null, currentAnswerText = "";
    let pollingInterval = null, isWaitingForNextQuestion = false;
    let sessionRestored = false;
    let questionAnswered = false;
    let draftAnswers = {};
    let reviewTimerInterval = null;
    let globalPauseActive = false;
    let globalPauseRemaining = 0;
    let videoElement = null; // для видео-раунда

    // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
    function showError(msg){ const d=document.getElementById('errorDisplay'); if(d){ d.innerText=msg; d.style.display='block'; setTimeout(()=>d.style.display='none',5000); } }
    async function awardPoints(playerId,delta){ const p=await restGet(`players/${playerId}`); if(p) await restPatch(`players/${playerId}`,{score:(p.score||0)+delta}); }

    async function setGlobalPause(active, remainingSeconds = null) {
        const pauseData = { active };
        if (remainingSeconds !== null) pauseData.remaining = remainingSeconds;
        await restPut('gameState/globalPause', pauseData);
    }

    async function clearGlobalPause() {
        await restDelete('gameState/globalPause');
    }
    
    async function getPlayerAnswerAndCheckStatus() {
        if (!currentUser || currentUser.isAdmin) return { answered: false, checked: false, answer: '' };
        try {
            const ansPath = `players/${currentUser.id}/roundAnswers/${currentRound}/q${currentQuestionIdx}`;
            const chkPath = `players/${currentUser.id}/checkedAnswers/${currentRound}/q${currentQuestionIdx}`;
            const [ans, checked] = await Promise.all([restGet(ansPath), restGet(chkPath)]);
            return {
                answered: ans?.answered || false,
                checked: checked?.checked || false,
                answer: ans?.answer || ''
            };
        } catch (e) {
            return { answered: false, checked: false, answer: '' };
        }
    }

    async function updateTeamsDisplay() {
        const players = await restGet('players') || {};
        const teams = [[], [], [], []];
        for(let id in players) {
            const p = players[id];
            if(p && p.team >= 0 && p.team < 4 && !p.isAdmin) teams[p.team].push(p.nickname);
        }
        const container = document.getElementById('teamsStatus');
        if(container) {
            container.innerHTML = '<h3>Состав команд:</h3>' + teams.map((t, i) => `<div class="team-display"><h3>Команда ${i+1}</h3><div>${t.join(', ') || 'пусто'}</div></div>`).join('');
        }
    }

    async function updateAdminTeamsDisplay() {
        const players = await restGet('players') || {};
        const teams = [[], [], [], []];
        const teamsScores = [0, 0, 0, 0];
        for(let id in players) {
            const p = players[id];
            if(p && p.team >= 0 && p.team < 4 && !p.isAdmin) {
                teams[p.team].push(p.nickname);
                teamsScores[p.team] += (p.score || 0);
            }
        }
        const container = document.getElementById('adminTeamsStatus');
        if(container) {
            let html = '<h3>Игроки по командам (очки):</h3>';
            for(let i=0; i<4; i++) {
                html += `<div class="team-display">
                    <strong>Команда ${i+1}</strong> — <span style="color: #2ecc71; font-weight: bold;">${teamsScores[i]} очков</span><br>
                    ${teams[i].join(', ') || 'нет'}
                </div>`;
            }
            container.innerHTML = html;
        }
    }

    async function updateAdminAnswersPanel() {
        const container = document.getElementById('adminAnswersPanel');
        if (!container) return;
        if (currentRound < 0 || currentRound >= roundsData.length) {
            container.innerHTML = `<p>Ожидание начала раунда...</p>`;
            return;
        }
        const round = roundsData[currentRound];
        
        if (round.type === "image_sequence" || round.type === "video") {
            const players = await restGet('players') || {};
            let html = `<h3>Ответы игроков на ${round.name} (вопрос ${currentQuestionIdx+1}/${round.questions.length})</h3>`;
            
            html += `<div style="background: #2c3e50; padding: 12px; border-radius: 10px; margin-bottom: 15px; text-align: left;">`;
            html += `<strong>✅ Правильные ответы:</strong><br>`;
            round.questions.forEach((q, idx) => {
                html += `Вопрос ${idx + 1}: <span style="color: #2ecc71;">${q.correctAnswer}</span><br>`;
            });
            html += `</div>`;
            
            html += `<table class="admin-answers-table">
                <tr>
                    <th>Игрок</th>
                    <th>Команда</th>
                    <th>Вопрос</th>
                    ${round.type === "image_sequence" ? "<th>Картинка №</th>" : ""}
                    <th>Ответ игрока</th>
                    <th>Правильный ответ</th>
                    <th>Действие</th>
                </tr>`;
            
            let anyAnswer = false;
            for (let id in players) {
                const p = players[id];
                if (p.isAdmin || !p.nickname) continue;
                const answers = p.roundAnswers && p.roundAnswers[currentRound];
                if (answers) {
                    for (let qIdx in answers) {
                        const ans = answers[qIdx];
                        if (ans && ans.answered) {
                            anyAnswer = true;
                            const points = round.type === "image_sequence" ? [4,3,2,1][ans.step] : 2; // для видео фиксированные баллы
                            const questionIndex = parseInt(qIdx.replace(/\D/g, '')) || 0;
                            const questionObj = round.questions[questionIndex];
                            const correctAns = questionObj ? questionObj.correctAnswer : '—';
                            html += `<tr>
                                <td>${p.nickname}</td>
                                <td>Команда ${p.team + 1}</td>
                                <td>${questionIndex + 1}</td>
                                ${round.type === "image_sequence" ? `<td>${ans.step + 1}</td>` : ""}
                                <td>${ans.answer}</td>
                                <td><span style="color: #2ecc71;">${correctAns}</span></td>
                                <td>
                                    <button class="mark-correct" data-player="${id}" data-q="${qIdx}" data-step="${ans.step || 0}">✅ +${points}</button>
                                    <button class="mark-wrong" data-player="${id}" data-q="${qIdx}">❌ -1</button>
                                </td>
                            </tr>`;
                        }
                    }
                }
            }
            if (!anyAnswer) html += `<tr><td colspan="${round.type === 'image_sequence' ? '7' : '6'}">Пока нет ответов</td></tr>`;
            html += `</table>`;
            container.innerHTML = html;
            
            document.querySelectorAll('.mark-correct').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const playerId = btn.getAttribute('data-player');
                    const qIdx = btn.getAttribute('data-q');
                    const step = parseInt(btn.getAttribute('data-step'));
                    const points = round.type === "image_sequence" ? [4, 3, 2, 1][step] : 2;
                    await awardPoints(playerId, points);
                    await restPut(`players/${playerId}/checkedAnswers/${currentRound}/${qIdx}`, { checked: true, timestamp: Date.now() });
                    await restDelete(`players/${playerId}/roundAnswers/${currentRound}/${qIdx}`);
                    updateAdminTeamsDisplay();
                    updateAdminAnswersPanel();
                });
            });
            document.querySelectorAll('.mark-wrong').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const playerId = btn.getAttribute('data-player');
                    const qIdx = btn.getAttribute('data-q');
                    await awardPoints(playerId, -1);
                    await restPut(`players/${playerId}/checkedAnswers/${currentRound}/${qIdx}`, { checked: true, timestamp: Date.now() });
                    await restDelete(`players/${playerId}/roundAnswers/${currentRound}/${qIdx}`);
                    updateAdminTeamsDisplay();
                    updateAdminAnswersPanel();
                });
            });
        } else {
            container.innerHTML = `<p>Раунд ${round.name} — автоматическая проверка (админ не требуется)</p>`;
        }
    }

    function showCurrentQuestion() {
        if (timerInterval) clearInterval(timerInterval);
        if (currentQuizTimer) clearTimeout(currentQuizTimer);
        
        const round = roundsData[currentRound];
        const question = round.questions[currentQuestionIdx];
        const container = document.getElementById('roundContent');
        if(!container) return;
        
        if(round.type === "image_sequence") {
            imageStep = 0; 
            answerGivenAtStep = -1; 
            userAnswerText = "";
            answered = false;
            questionAnswered = false;
            currentAnswerText = "";
            delete draftAnswers[`${currentRound}_${currentQuestionIdx}`];
            currentQuestionObj = question;
            restoreImageState(question);
        } else if (round.type === "video") {
            // подготовка видео-вопроса
            answered = false;
            questionAnswered = false;
            currentAnswerText = "";
            delete draftAnswers[`${currentRound}_${currentQuestionIdx}`];
            currentQuestionObj = question;
            startVideoQuestion(question);
        } else {
            container.innerHTML = `
                <div class="question-block">
                    <h2>${round.name} | Вопрос ${currentQuestionIdx+1} из ${round.questions.length}</h2>
                    <div style="font-size:24px; margin:20px;">${question.text}</div>
                    <div id="quizOptions"></div>
                </div>
                <div class="progress-info">⏱️ Время на ответ: 15 секунд</div>
            `;
            const optsDiv = document.getElementById('quizOptions');
            question.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.className = "quiz-option-btn";
                btn.onclick = () => answerQuiz(idx);
                optsDiv.appendChild(btn);
            });
            let timeLeft = 15;
            const timerDiv = document.createElement('div');
            timerDiv.className = "timer";
            timerDiv.innerText = timeLeft;
            container.appendChild(timerDiv);
            const tickQuiz = async () => {
                if(!gameActive || !roundInProgress) return;
                const pauseState = await restGet('gameState/globalPause');
                if (pauseState && pauseState.active) {
                    currentQuizTimer = setTimeout(tickQuiz, 500);
                    return;
                }
                timeLeft--;
                if(timerDiv) timerDiv.innerText = timeLeft;
                if(timeLeft <= 0) {
                    if(roundInProgress) {
                        alert("Время вышло!");
                        nextQuestionOrRound();
                    }
                } else {
                    currentQuizTimer = setTimeout(tickQuiz, 1000);
                }
            };
            currentQuizTimer = setTimeout(tickQuiz, 1000);
        }
    }

    async function restoreImageState(question) {
        const state = await restGet('gameState');
        
        if (state && state.active && state.currentRound === currentRound && state.currentQuestion === currentQuestionIdx) {
            imageStep = (state.imageStep >= 4) ? 0 : (state.imageStep || 0);
            if (currentUser?.isAdmin) {
                answered = state.answered || false;
                questionAnswered = state.questionAnswered || false;
                currentAnswerText = state.answerText || '';
            }
        } else {
            imageStep = 0;
            answered = false;
            questionAnswered = false;
            currentAnswerText = '';
        }
        
        if (!currentUser?.isAdmin) {
            const playerAns = await getPlayerAnswerAndCheckStatus();
            if (playerAns.answered || playerAns.checked) {
                questionAnswered = true;
                answered = true;
                currentAnswerText = playerAns.answer || currentAnswerText;
            } else {
                questionAnswered = false;
                answered = false;
                const draftKey = `${currentRound}_${currentQuestionIdx}`;
                if (draftAnswers[draftKey]) {
                    currentAnswerText = draftAnswers[draftKey];
                }
            }
        }
        
        if (imageStep >= 4) {
            startPauseBetweenQuestions();
            return;
        }
        
        const startTime = (imageStep === 3) ? 12 : 8;
        startImageQuestion(question, questionAnswered, startTime);
    }

    function startImageQuestion(question, alreadyAnswered = false, startTime = null) {
        if (!alreadyAnswered) {
            answered = false;
            questionAnswered = false;
        } else {
            questionAnswered = true;
            answered = true;
        }
        
        if (imageStep >= 4) {
            startPauseBetweenQuestions();
            return;
        }
        
        let timeLeft = startTime !== null ? startTime : ((imageStep === 3) ? 12 : 8);
        const container = document.getElementById('roundContent');
        const imgUrl = question.images[imageStep];
        
        const draftKey = `${currentRound}_${currentQuestionIdx}`;
        let displayText = '';
        if (questionAnswered) {
            displayText = currentAnswerText;
        } else {
            if (draftAnswers[draftKey]) {
                displayText = draftAnswers[draftKey];
                currentAnswerText = displayText;
            } else {
                displayText = currentAnswerText || '';
            }
        }
        const safeAnswerText = displayText;
        const inputDisabled = questionAnswered ? 'disabled' : '';
        
        container.innerHTML = `
            <div class="image-round-container">
                <h2>${roundsData[currentRound].name} | Вопрос ${currentQuestionIdx+1} из ${roundsData[currentRound].questions.length}</h2>
                <div class="timer" id="timer">${timeLeft}</div>
                <img src="${imgUrl}" class="round-image" id="roundImage">
                <div>
                    <input type="text" id="answerInput" class="answer-input" placeholder="Введите название аниме" ${inputDisabled} value="${safeAnswerText.replace(/"/g, '&quot;')}">
                    <button id="submitAnswerBtn" ${inputDisabled}>Ответить</button>
                </div>
                <p>Картинка ${imageStep+1} из 4</p>
            </div>
        `;
        const answerInput = document.getElementById('answerInput');
        const submitBtn = document.getElementById('submitAnswerBtn');
        
        if(!questionAnswered) {
            answerInput.addEventListener('input', (e) => {
                currentAnswerText = e.target.value;
                draftAnswers[draftKey] = e.target.value;
            });
            if(currentAnswerText) answerInput.value = currentAnswerText;
            
            submitBtn.onclick = async () => {
                if (!currentUser?.isAdmin) {
                    const status = await getPlayerAnswerAndCheckStatus();
                    if (status.checked || status.answered) {
                        alert("Вы уже ответили или ваш ответ проверен.");
                        return;
                    }
                }
                if(questionAnswered) return;
                const answer = answerInput.value.trim();
                if(answer === "") { alert("Введите ответ"); return; }
                
                answered = true;
                questionAnswered = true;
                answerGivenAtStep = imageStep;
                userAnswerText = answer;
                currentAnswerText = answer;
                delete draftAnswers[draftKey];
                
                if(currentUser && !currentUser.isAdmin) {
                    const path = `players/${currentUser.id}/roundAnswers/${currentRound}/q${currentQuestionIdx}`;
                    await restPut(path, { answered: true, step: imageStep, answer: answer, timestamp: Date.now() });
                }
                
                if(currentUser?.isAdmin) {
                    await restPut('gameState', {
                        active: true,
                        currentRound: currentRound,
                        currentQuestion: currentQuestionIdx,
                        imageStep: imageStep,
                        imageTimeLeft: timeLeft,
                        answered: true,
                        questionAnswered: true,
                        answerText: answer
                    });
                }
                
                answerInput.disabled = true;
                submitBtn.disabled = true;
                
                if(currentUser?.isAdmin) await updateAdminAnswersPanel();
            };
        }
     
        if(timerInterval) clearInterval(timerInterval);
        const tick = async () => {
            if(!gameActive || !roundInProgress) return;
            
            const pauseState = await restGet('gameState/globalPause');
            if (pauseState && pauseState.active) {
                if (!globalPauseActive) {
                    globalPauseActive = true;
                    globalPauseRemaining = timeLeft;
                }
                timerInterval = setTimeout(tick, 500);
                return;
            } else {
                if (globalPauseActive) {
                    globalPauseActive = false;
                    if (pauseState && pauseState.remaining !== undefined) {
                        timeLeft = pauseState.remaining;
                    }
                }
            }
            
            timeLeft--;
            const timerDiv = document.getElementById('timer');
            if(timerDiv) timerDiv.innerText = timeLeft;
            
            if(timeLeft <= 0) {
                if(currentUser?.isAdmin) {
                    imageStep++;
                    const nextTime = (imageStep === 3) ? 12 : 8;
                    await restPut('gameState', {
                        active: true,
                        currentRound: currentRound,
                        currentQuestion: currentQuestionIdx,
                        imageStep: imageStep,
                        imageTimeLeft: nextTime,
                        answered: false,
                        questionAnswered: questionAnswered,
                        answerText: currentAnswerText
                    });
                    if(imageStep < 4) {
                        startImageQuestion(question, questionAnswered, nextTime);
                    } else {
                        startPauseBetweenQuestions();
                    }
                }
            } else {
                timerInterval = setTimeout(tick, 1000);
            }
        };
        timerInterval = setTimeout(tick, 1000);
    }

    function startVideoQuestion(question) {
        const round = roundsData[currentRound];
        const container = document.getElementById('roundContent');
        const timeLeft = 15; // длительность видео
        
        const draftKey = `${currentRound}_${currentQuestionIdx}`;
        let displayText = currentAnswerText || (draftAnswers[draftKey] || '');
        const inputDisabled = questionAnswered ? 'disabled' : '';
        
        container.innerHTML = `
            <div class="image-round-container">
                <h2>${round.name} | Вопрос ${currentQuestionIdx+1} из ${round.questions.length}</h2>
                <div class="timer" id="timer">${timeLeft}</div>
                <video id="questionVideo" class="video-player" autoplay controlsList="nodownload" oncontextmenu="return false;">
                    <source src="${question.video}" type="video/mp4">
                    Ваш браузер не поддерживает видео.
                </video>
                <div>
                    <input type="text" id="answerInput" class="answer-input" placeholder="Введите название аниме" ${inputDisabled} value="${displayText.replace(/"/g, '&quot;')}">
                    <button id="submitAnswerBtn" ${inputDisabled}>Ответить</button>
                </div>
                <p>🎬 Смотрите отрывок и угадывайте!</p>
            </div>
        `;
        
        const video = document.getElementById('questionVideo');
        const answerInput = document.getElementById('answerInput');
        const submitBtn = document.getElementById('submitAnswerBtn');
        const timerDiv = document.getElementById('timer');
        
        videoElement = video;
        
        // Устанавливаем длительность видео 15 сек (если видео короче, зацикливать не будем)
        video.addEventListener('loadedmetadata', () => {
            if (video.duration < 15) {
                // если видео короче, можно поставить loop, но мы просто будем ждать окончания
            }
        });
        
        if (!questionAnswered) {
            answerInput.addEventListener('input', (e) => {
                currentAnswerText = e.target.value;
                draftAnswers[draftKey] = e.target.value;
            });
            
            submitBtn.onclick = async () => {
                if (!currentUser?.isAdmin) {
                    const status = await getPlayerAnswerAndCheckStatus();
                    if (status.checked || status.answered) {
                        alert("Вы уже ответили или ваш ответ проверен.");
                        return;
                    }
                }
                if (questionAnswered) return;
                const answer = answerInput.value.trim();
                if (answer === "") { alert("Введите ответ"); return; }
                
                answered = true;
                questionAnswered = true;
                currentAnswerText = answer;
                delete draftAnswers[draftKey];
                
                if (currentUser && !currentUser.isAdmin) {
                    const path = `players/${currentUser.id}/roundAnswers/${currentRound}/q${currentQuestionIdx}`;
                    await restPut(path, { answered: true, answer: answer, timestamp: Date.now() });
                }
                
                if (currentUser?.isAdmin) {
                    await restPut('gameState', {
                        active: true,
                        currentRound: currentRound,
                        currentQuestion: currentQuestionIdx,
                        videoAnswered: true,
                        answerText: answer
                    });
                }
                
                answerInput.disabled = true;
                submitBtn.disabled = true;
                video.pause();
                
                if (currentUser?.isAdmin) await updateAdminAnswersPanel();
            };
        }
        
        let remaining = timeLeft;
        const tick = async () => {
            if (!gameActive || !roundInProgress) return;
            
            const pauseState = await restGet('gameState/globalPause');
            if (pauseState && pauseState.active) {
                timerInterval = setTimeout(tick, 500);
                return;
            }
            
            remaining--;
            timerDiv.innerText = remaining;
            
            if (remaining <= 0 || video.ended) {
                // Время вышло или видео закончилось
                if (!questionAnswered && !answered) {
                    // Автоматически не отправляем, просто переходим к паузе
                }
                if (currentUser?.isAdmin) {
                    startPauseBetweenQuestions(round.pauseDuration || 10);
                }
                clearInterval(timerInterval);
            } else {
                timerInterval = setTimeout(tick, 1000);
            }
        };
        timerInterval = setTimeout(tick, 1000);
        
        // Обработчик окончания видео
        video.addEventListener('ended', () => {
            if (currentUser?.isAdmin) {
                // Если видео закончилось раньше таймера, админ может форсировать паузу
                if (!questionAnswered) {
                    // Можно дать возможность ответить до конца таймера, но проще перейти к паузе
                    startPauseBetweenQuestions(round.pauseDuration || 10);
                }
            }
        });
    }

    function startPauseBetweenQuestions(customDuration = null) {
        const round = roundsData[currentRound];
        const pauseDuration = customDuration !== null ? customDuration : (round.type === "image_sequence" ? 15 : 10);
        
        if (pauseInterval) clearInterval(pauseInterval);
        pauseActive = true;
        isWaitingForNextQuestion = true;

        if (currentUser && currentUser.isAdmin) {
            const pauseEndTime = Date.now() + pauseDuration * 1000;
            restPut('gameState/pause', {
                active: true,
                endTime: pauseEndTime,
                skip: false
            });
        }

        document.getElementById('pauseTitle').innerText = "⏸️ Пауза между вопросами";
        document.getElementById('pauseMessage').innerHTML = `Следующий вопрос начнётся через:`;
        document.getElementById('skipPauseBtn').classList.remove('hidden');
        document.getElementById('pauseScreen').classList.remove('hidden');
        document.getElementById('quizScreen').classList.add('hidden');

        let remaining = pauseDuration;
        const timerDiv = document.getElementById('pauseTimer');
        timerDiv.innerText = remaining;

        pauseInterval = setInterval(() => {
            remaining--;
            timerDiv.innerText = remaining;
            if (remaining <= 0) {
                clearInterval(pauseInterval);
                if (currentUser && currentUser.isAdmin) {
                    restDelete('gameState/pause');
                }
                pauseActive = false;
                isWaitingForNextQuestion = false;
                document.getElementById('pauseScreen').classList.add('hidden');
                if (currentQuestionIdx + 1 < round.questions.length) {
                    currentQuestionIdx++;
                    showCurrentQuestion();
                    document.getElementById('quizScreen').classList.remove('hidden');
                } else {
                    finishRound();
                }
            }
        }, 1000);
    }

    async function answerQuiz(selectedIdx) {
        if(!gameActive || !roundInProgress) return;
        const question = roundsData[currentRound].questions[currentQuestionIdx];
        const isCorrect = (selectedIdx === question.correct);
        let delta = isCorrect ? question.points : 0;
        if(delta !== 0) {
            await awardPoints(currentUser.id, delta);
            alert(`✅ Правильно! +${delta} баллов`);
        } else {
            alert(`❌ Неправильно. Правильный ответ: ${question.options[question.correct]}`);
        }
        if(currentQuizTimer) clearTimeout(currentQuizTimer);
        nextQuestionOrRound();
    }

    async function nextQuestionOrRound() {
        if(timerInterval) clearInterval(timerInterval);
        const round = roundsData[currentRound];
        if(round.type !== "image_sequence" && round.type !== "video") {
            if(currentQuestionIdx + 1 < round.questions.length) {
                currentQuestionIdx++;
                showCurrentQuestion();
            } else {
                await finishRound();
            }
        }
    }

    async function finishRound() {
        roundInProgress = false;
        gameActive = false;
        await restPut('gameState', { active: false, currentRound: currentRound, currentQuestion: currentQuestionIdx, roundFinished: true });
        showWaitingScreen();
        if(currentUser && currentUser.isAdmin) {
            document.getElementById('nextRoundBtn').classList.remove('hidden');
            document.getElementById('showAnswersBtn').classList.remove('hidden');
            await updateAdminAnswersPanel();
        }
        if(currentUser?.isAdmin) {
            document.getElementById('globalPauseBtn').classList.add('hidden');
            document.getElementById('globalResumeBtn').classList.add('hidden');
            await clearGlobalPause();
        }
    }

    async function startRound(roundIndex) {
        if(roundIndex >= roundsData.length) {
            alert("Игра завершена!");
            showFinalResults();
            return;
        }
        if(pauseInterval) clearInterval(pauseInterval);
        pauseActive = false;
        isWaitingForNextQuestion = false;
        document.getElementById('pauseScreen').classList.add('hidden');
        currentRound = roundIndex;
        currentQuestionIdx = 0;
        gameActive = true;
        if(currentUser?.isAdmin) {
            document.getElementById('globalPauseBtn').classList.remove('hidden');
            document.getElementById('globalResumeBtn').classList.add('hidden');
        }
        roundInProgress = true;
        
        answered = false;
        questionAnswered = false;
        currentAnswerText = "";
        imageStep = 0;
        draftAnswers = {};
        
        await restPut('gameState', {
            active: true,
            currentRound: roundIndex,
            currentQuestion: 0,
            roundFinished: false,
            imageStep: 0,
            imageTimeLeft: 8,
            answered: false
        });
        
        document.getElementById('showAnswersBtn')?.classList.add('hidden');
        const players = await restGet('players') || {};
        for(let id in players) {
            if(!players[id].isAdmin) {
                await restDelete(`players/${id}/roundAnswers/${roundIndex}`);
            }
        }
        showCurrentQuestion();
        if(currentUser && currentUser.isAdmin) {
            document.getElementById('nextRoundBtn').classList.add('hidden');
            await updateAdminAnswersPanel();
        }
        document.getElementById('waitingScreen').classList.add('hidden');
        document.getElementById('quizScreen').classList.remove('hidden');
        document.getElementById('pauseScreen').classList.add('hidden');
    }

    async function startAnswersReview() {
        if (!currentUser?.isAdmin) return;
        const round = roundsData[0]; // первый раунд (картинки)
        if (!round || round.type !== "image_sequence") return;
        
        await restPut('gameState/answersReview', {
            active: true,
            roundIndex: 0,
            currentSlide: 0,
            totalSlides: round.questions.length
        });
        showAnswerSlide(0);
    }

    function showAnswerSlide(slideIndex) {
        if (reviewTimerInterval) clearInterval(reviewTimerInterval);
        const round = roundsData[0];
        const question = round.questions[slideIndex];
        const container = document.getElementById('answersReviewContent');
        if (!container) return;
        
        let imagesHtml = '';
        question.images.forEach(img => {
            imagesHtml += `<img src="${img}" class="round-image" style="max-width:200px; margin:5px;">`;
        });
        
        container.innerHTML = `
            <h2>${round.name} — Правильный ответ ${slideIndex+1}/${round.questions.length}</h2>
            <div class="answers-review-container">${imagesHtml}</div>
            <div class="correct-answer-big">${question.correctAnswer}</div>
            <div class="timer" id="reviewTimer">10</div>
        `;
        container.setAttribute('data-slide', slideIndex);
        
        if (currentUser?.isAdmin) {
            let timeLeft = 10;
            const timerDiv = document.getElementById('reviewTimer');
            reviewTimerInterval = setInterval(async () => {
                timeLeft--;
                if (timerDiv) timerDiv.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(reviewTimerInterval);
                    const nextIndex = slideIndex + 1;
                    if (nextIndex < round.questions.length) {
                        await restPatch('gameState/answersReview', { currentSlide: nextIndex });
                        showAnswerSlide(nextIndex);
                    } else {
                        await restDelete('gameState/answersReview');
                        document.getElementById('answersReviewScreen').classList.add('hidden');
                        showWaitingScreen();
                    }
                }
            }, 1000);
        }
    }

    async function showFinalResults() {
        document.getElementById('waitingScreen').classList.add('hidden');
        document.getElementById('quizScreen').classList.add('hidden');
        document.getElementById('pauseScreen').classList.add('hidden');
        document.getElementById('answersReviewScreen').classList.add('hidden');
        document.getElementById('resultScreen').classList.remove('hidden');
        const players = await restGet('players') || {};
        let teamsScores = [0,0,0,0];
        for(let id in players) {
            let p = players[id];
            if(p && p.team >= 0 && p.team < 4 && !p.isAdmin) {
                teamsScores[p.team] += (p.score || 0);
            }
        }
        let html = '<h3>Итоговые результаты команд:</h3>';
        for(let i=0; i<4; i++) html += `<div class="team-display">Команда ${i+1}: ${teamsScores[i]} очков</div>`;
        document.getElementById('finalResults').innerHTML = html;
    }

    function showWaitingScreen() {
        document.getElementById('waitingScreen').classList.remove('hidden');
        document.getElementById('quizScreen').classList.add('hidden');
        document.getElementById('pauseScreen').classList.add('hidden');
        document.getElementById('answersReviewScreen').classList.add('hidden');
        document.getElementById('resultScreen').classList.add('hidden');
        if(currentUser && !currentUser.isAdmin) {
            const changeBlock = document.getElementById('changeTeamBlock');
            if(changeBlock) changeBlock.classList.remove('hidden');
            const btns = document.querySelectorAll('#changeTeamButtons .team-btn');
            btns.forEach(btn => {
                if(parseInt(btn.dataset.team) === currentUser.team) btn.classList.add('selected');
                else btn.classList.remove('selected');
            });
        } else if(currentUser && currentUser.isAdmin) {
            document.getElementById('changeTeamBlock')?.classList.add('hidden');
        }
    }

    function startPolling() {
        if (pollingInterval) clearInterval(pollingInterval);
        pollingInterval = setInterval(async () => {
            try {
                const state = await restGet('gameState');
                const pauseState = await restGet('gameState/pause');
                const reviewState = await restGet('gameState/answersReview');

                if (reviewState && reviewState.active) {
                    document.getElementById('waitingScreen')?.classList.add('hidden');
                    document.getElementById('quizScreen')?.classList.add('hidden');
                    document.getElementById('pauseScreen')?.classList.add('hidden');
                    document.getElementById('answersReviewScreen')?.classList.remove('hidden');
                    
                    if (!currentUser?.isAdmin) {
                        const round = roundsData[reviewState.roundIndex];
                        const question = round.questions[reviewState.currentSlide];
                        const container = document.getElementById('answersReviewContent');
                        let imagesHtml = '';
                        question.images.forEach(img => {
                            imagesHtml += `<img src="${img}" class="round-image" style="max-width:200px; margin:5px;">`;
                        });
                        container.innerHTML = `
                            <h2>${round.name} — Правильный ответ ${reviewState.currentSlide+1}/${reviewState.totalSlides}</h2>
                            <div class="answers-review-container">${imagesHtml}</div>
                            <div class="correct-answer-big">${question.correctAnswer}</div>
                        `;
                    } else {
                        const lastSlide = document.getElementById('answersReviewContent')?.getAttribute('data-slide');
                        if (lastSlide != reviewState.currentSlide) {
                            showAnswerSlide(reviewState.currentSlide);
                        }
                    }
                    return;
                } else {
                    document.getElementById('answersReviewScreen')?.classList.add('hidden');
                }

                const globalPause = await restGet('gameState/globalPause');
                if (globalPause && globalPause.active) {
                    if (currentUser?.isAdmin) {
                        document.getElementById('globalPauseBtn').classList.add('hidden');
                        document.getElementById('globalResumeBtn').classList.remove('hidden');
                    }
                } else {
                    if (currentUser?.isAdmin) {
                        document.getElementById('globalPauseBtn').classList.remove('hidden');
                        document.getElementById('globalResumeBtn').classList.add('hidden');
                    }
                }

                if (state && state.reset) {
                    if (!currentUser || !currentUser.isAdmin) {
                        localStorage.removeItem('quizUser');
                        location.reload();
                    }
                    return;
                }

                if (state && state.active && !gameActive && !roundInProgress && !pauseActive) {
                    gameActive = true; roundInProgress = true;
                    currentRound = state.currentRound; currentQuestionIdx = state.currentQuestion || 0;
                    if (currentRound < roundsData.length) {
                        showCurrentQuestion();
                        document.getElementById('quizScreen')?.classList.remove('hidden');
                        document.getElementById('waitingScreen')?.classList.add('hidden');
                        document.getElementById('pauseScreen')?.classList.add('hidden');
                    } else {
                        showFinalResults();
                    }
                } else if (state && !state.active && gameActive && !pauseActive) {
                    gameActive = false; roundInProgress = false;
                    showWaitingScreen();
                    if (currentUser?.isAdmin) await updateAdminAnswersPanel();
                } else if (state && state.active && gameActive && roundInProgress && !pauseActive) {
                    // Синхронизация для image_sequence
                    if (roundsData[currentRound]?.type === "image_sequence") {
                        if (!currentUser?.isAdmin && state.currentRound === currentRound && state.currentQuestion === currentQuestionIdx) {
                            if (state.imageStep !== imageStep) {
                                if (timerInterval) clearInterval(timerInterval);
                                imageStep = state.imageStep;
                                
                                if (!currentUser?.isAdmin) {
                                    const playerAns = await getPlayerAnswerAndCheckStatus();
                                    if (playerAns.answered || playerAns.checked) {
                                        questionAnswered = true;
                                        answered = true;
                                        currentAnswerText = playerAns.answer || currentAnswerText;
                                    }
                                }
                                
                                const round = roundsData[currentRound];
                                const question = round.questions[currentQuestionIdx];
                                const startTime = (imageStep === 3) ? 12 : 8;
                                startImageQuestion(question, questionAnswered, startTime);
                            }
                        }
                    }
                }

                if (pauseState) {
                    const now = Date.now();
                    const shouldEndPause = pauseState.skip || (pauseState.endTime && now >= pauseState.endTime);

                    if (shouldEndPause) {
                        if (pauseActive) {
                            clearInterval(pauseInterval);
                            pauseActive = false;
                            isWaitingForNextQuestion = false;
                            document.getElementById('pauseScreen')?.classList.add('hidden');
                            if (currentQuestionIdx + 1 < roundsData[currentRound].questions.length) {
                                currentQuestionIdx++;
                                showCurrentQuestion();
                                document.getElementById('quizScreen')?.classList.remove('hidden');
                            } else {
                                finishRound();
                            }
                        }
                        if (currentUser?.isAdmin || pauseState.skip) {
                            await restDelete('gameState/pause');
                        }
                    } else if (pauseState.active && !pauseActive) {
                        if (!currentUser?.isAdmin) {
                            pauseActive = true;
                            isWaitingForNextQuestion = true;
                            document.getElementById('pauseTitle').innerText = "⏸️ Пауза между вопросами";
                            document.getElementById('pauseMessage').innerHTML = "Следующий вопрос начнётся через:";
                            document.getElementById('skipPauseBtn')?.classList.add('hidden');
                            document.getElementById('pauseScreen')?.classList.remove('hidden');
                            document.getElementById('quizScreen')?.classList.add('hidden');
                            
                            let remaining = Math.max(0, Math.ceil((pauseState.endTime - now) / 1000));
                            const timerDiv = document.getElementById('pauseTimer');
                            timerDiv.innerText = remaining;
                            
                            pauseInterval = setInterval(() => {
                                remaining--;
                                timerDiv.innerText = remaining;
                                if (remaining <= 0) {
                                    clearInterval(pauseInterval);
                                }
                            }, 1000);
                        }
                    }
                }

                await updateTeamsDisplay();
                if (currentUser?.isAdmin) {
                    await updateAdminTeamsDisplay();
                    if ((roundsData[currentRound]?.type === "image_sequence" || roundsData[currentRound]?.type === "video") && currentRound >= 0 && currentRound < roundsData.length) {
                        await updateAdminAnswersPanel();
                    }
                }
            } catch (e) { 
                console.warn("⚠️ Ошибка опроса Firebase:", e); 
            }
        }, 500);
    }

    async function joinGame(nickname, team) {
        try {
            const userId = nickname + "_" + Date.now();
            await restPut(`players/${userId}`, { nickname, team: parseInt(team), score: 0, isAdmin: false });
            currentUser = { nickname, team: parseInt(team), isAdmin: false, id: userId };
            localStorage.setItem('quizUser', JSON.stringify(currentUser));
            sessionRestored = true;
            console.log("✅ Игрок создан, переходим в игру");
            showGameScreen();
        } catch (e) {
            console.error("❌ Ошибка joinGame:", e);
            alert("Не удалось подключиться к серверу. Проверьте соединение или настройки Firebase.");
        }
    }

    async function adminLogin(password) {
        if (password !== "admin123") { alert("Неверный пароль"); return; }
        try {
            const adminId = "admin_" + Date.now();
            currentUser = { nickname: "Админ", team: -1, isAdmin: true, id: adminId };
            localStorage.setItem('quizUser', JSON.stringify(currentUser));
            sessionRestored = true;
            console.log("👑 Админ вошёл");
            showGameScreen();
            document.getElementById('adminPanel')?.classList.remove('hidden');
        } catch (e) {
            console.error("❌ Ошибка adminLogin:", e);
            alert("Ошибка входа администратора.");
        }
    }

    function showGameScreen() {
        const gameScreen = document.getElementById('gameScreen');
        if (!gameScreen) return;
        if (!gameScreen.classList.contains('hidden') && currentUser) {
            console.log("🛑 showGameScreen прервана: экран уже активен для", currentUser.nickname);
            return;
        }
        console.log("🎮 showGameScreen вызвана, currentUser:", currentUser);
        document.getElementById('loginScreen')?.classList.add('hidden');
        gameScreen.classList.remove('hidden');
        document.getElementById('playerInfo').innerHTML = `Вы: ${currentUser.nickname} ${currentUser.isAdmin ? '(админ)' : ''}`;
        startPolling();
        if (!currentUser.isAdmin) {
            showWaitingScreen();
        } else {
            document.getElementById('changeTeamBlock')?.classList.add('hidden');
            showWaitingScreen();
            updateAdminTeamsDisplay();
        }
    }

    async function changeTeam(newTeam) {
        if(gameActive) {
            document.getElementById('changeTeamMsg').innerHTML = "❌ Нельзя сменить команду после начала игры!";
            setTimeout(() => document.getElementById('changeTeamMsg').innerHTML = "", 3000);
            return;
        }
        if(!currentUser || currentUser.isAdmin) return;
        await restPatch(`players/${currentUser.id}`, { team: parseInt(newTeam) });
        currentUser.team = parseInt(newTeam);
        const saved = localStorage.getItem('quizUser');
        if(saved) {
            let u = JSON.parse(saved);
            u.team = parseInt(newTeam);
            localStorage.setItem('quizUser', JSON.stringify(u));
        }
        document.getElementById('changeTeamMsg').innerHTML = "✅ Команда изменена!";
        setTimeout(() => document.getElementById('changeTeamMsg').innerHTML = "", 2000);
        await updateTeamsDisplay();
        if(currentUser && currentUser.isAdmin) await updateAdminTeamsDisplay();
        const btns = document.querySelectorAll('#changeTeamButtons .team-btn');
        btns.forEach(btn => {
            if(parseInt(btn.dataset.team) === currentUser.team) btn.classList.add('selected');
            else btn.classList.remove('selected');
        });
    }

    async function clearAllPlayers() {
        if(!currentUser || !currentUser.isAdmin) return;
        if(confirm("Вы уверены, что хотите удалить ВСЕХ игроков? Это действие необратимо.")) {
            const players = await restGet('players') || {};
            for(let id in players) {
                if(!players[id].isAdmin) {
                    await restDelete(`players/${id}`);
                }
            }
            alert("Все игроки удалены.");
            await updateAdminTeamsDisplay();
            await updateTeamsDisplay();
        }
    }

    async function resetGame() {
        if(!currentUser || !currentUser.isAdmin) return;
        if(confirm("Сбросить игру? Все данные игроков и прогресс будут удалены.")) {
            const players = await restGet('players') || {};
            for(let id in players) {
                if(!players[id].isAdmin) {
                    await restDelete(`players/${id}`);
                }
            }
            await restDelete('gameState');
            localStorage.removeItem('quizUser');
            location.reload();
        }
    }

    // ==================== ВОССТАНОВЛЕНИЕ СЕССИИ ====================
    (function restoreSession() {
        const saved = localStorage.getItem('quizUser');
        if (!saved || sessionRestored) return;
        sessionRestored = true;
        try {
            const u = JSON.parse(saved);
            if (u.isAdmin) {
                currentUser = u;
                if (document.getElementById('gameScreen').classList.contains('hidden')) showGameScreen();
                document.getElementById('adminPanel')?.classList.remove('hidden');
            } else {
                restGet(`players/${u.id}`).then(async (playerData) => {
                    if (!playerData) await restPut(`players/${u.id}`, { nickname: u.nickname, team: u.team, score: 0, isAdmin: false });
                    else if (playerData.team !== u.team) { u.team = playerData.team; localStorage.setItem('quizUser', JSON.stringify(u)); }
                    currentUser = u;
                    if (document.getElementById('gameScreen').classList.contains('hidden')) showGameScreen();
                }).catch(e => { console.error("Ошибка восстановления:", e); currentUser = u; if (document.getElementById('gameScreen').classList.contains('hidden')) showGameScreen(); });
            }
        } catch (e) { localStorage.removeItem('quizUser'); }
    })();

    // ==================== ОБРАБОТЧИКИ КНОПОК ====================
    function setupListeners() {
        populateRoundSelect();
        
        document.getElementById('joinBtn')?.addEventListener('click', () => {
            const nick = document.getElementById('nickname').value.trim();
            const teamBtn = document.querySelector('#loginTeamButtons .team-btn.selected');
            if (!nick) { alert("Введи никнейм"); return; }
            if (!teamBtn) { alert("Выбери команду"); return; }
            localStorage.removeItem('quizUser');
            sessionRestored = false;
            joinGame(nick, teamBtn.dataset.team);
        });
        
        document.getElementById('globalPauseBtn')?.addEventListener('click', async () => {
            if (!currentUser?.isAdmin) return;
            const timerDiv = document.getElementById('timer');
            const remaining = timerDiv ? parseInt(timerDiv.innerText) : 0;
            await setGlobalPause(true, remaining);
            document.getElementById('globalPauseBtn').classList.add('hidden');
            document.getElementById('globalResumeBtn').classList.remove('hidden');
        });

        document.getElementById('globalResumeBtn')?.addEventListener('click', async () => {
            if (!currentUser?.isAdmin) return;
            await clearGlobalPause();
            document.getElementById('globalResumeBtn').classList.add('hidden');
            document.getElementById('globalPauseBtn').classList.remove('hidden');
        });
        
        document.getElementById('adminLoginFromStartBtn')?.addEventListener('click', ()=>{
            const pwd = prompt("Пароль администратора:");
            if (pwd) adminLogin(pwd);
        });
        
        document.getElementById('startSelectedRoundBtn')?.addEventListener('click', ()=>{
            if(currentUser?.isAdmin) {
                const select = document.getElementById('roundSelect');
                const roundIdx = parseInt(select.value);
                startRound(roundIdx);
            }
        });
        
        document.getElementById('nextRoundBtn')?.addEventListener('click', async ()=>{
            if(currentUser?.isAdmin) currentRound+1 < roundsData.length ? await startRound(currentRound+1) : showFinalResults();
        });
        
        document.getElementById('showAnswersBtn')?.addEventListener('click', startAnswersReview);
        document.getElementById('clearPlayersBtn')?.addEventListener('click', clearAllPlayers);
        document.getElementById('resetGameBtn')?.addEventListener('click', resetGame);
        
        document.getElementById('becomeAdminBtn')?.addEventListener('click', ()=>{
            const pwd = prompt("Пароль администратора:");
            if (pwd==="admin123") { if(currentUser && !currentUser.isAdmin) restDelete(`players/${currentUser.id}`); adminLogin(pwd); }
            else if(pwd) alert("Неверный пароль");
        });
        
        document.getElementById('skipPauseBtn')?.addEventListener('click', ()=>{
            if(currentUser?.isAdmin) skipCurrentPause(); else alert("Только админ может пропустить паузу");
        });
        
        document.querySelectorAll('#loginTeamButtons .team-btn').forEach(b=> b.addEventListener('click', ()=>{
            document.querySelectorAll('#loginTeamButtons .team-btn').forEach(x=>x.classList.remove('selected')); b.classList.add('selected');
        }));
        
        document.querySelectorAll('#changeTeamButtons .team-btn').forEach(b=> b.addEventListener('click', async ()=>{
            if(!gameActive && currentUser && !currentUser.isAdmin){
                await restPatch(`players/${currentUser.id}`, {team: parseInt(b.dataset.team)});
                currentUser.team = parseInt(b.dataset.team);
                localStorage.setItem('quizUser', JSON.stringify(currentUser));
                document.querySelectorAll('#changeTeamButtons .team-btn').forEach(x=>x.classList.remove('selected'));
                b.classList.add('selected');
                document.getElementById('changeTeamMsg').innerHTML="✅ Команда изменена!";
                setTimeout(()=> document.getElementById('changeTeamMsg').innerHTML="", 2000);
                updateTeamsDisplay();
            } else document.getElementById('changeTeamMsg').innerHTML = "Нельзя сменить команду после старта";
        }));
        
        const firstTeam = document.querySelector('#loginTeamButtons .team-btn');
        if(firstTeam) firstTeam.classList.add('selected');
    }
    
    function skipCurrentPause() {
        if (!currentUser || !currentUser.isAdmin) return;
        restPut('gameState/pause', { skip: true });
        if (pauseInterval) clearInterval(pauseInterval);
        pauseActive = false;
        document.getElementById('pauseScreen').classList.add('hidden');
        if (isWaitingForNextQuestion) {
            isWaitingForNextQuestion = false;
            if (currentQuestionIdx + 1 < roundsData[currentRound].questions.length) {
                currentQuestionIdx++;
                showCurrentQuestion();
                document.getElementById('quizScreen').classList.remove('hidden');
            } else {
                finishRound();
            }
        }
    }

    setupListeners();
</script>
