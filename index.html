<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-eval' 'unsafe-inline' https://www.gstatic.com https://*.firebaseio.com https://*.googleapis.com;">
    <title>Аниме викторина | Командная игра</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        input, select, button {
            padding: 10px;
            margin: 10px;
            border-radius: 30px;
            border: none;
            font-size: 16px;
        }
        button {
            background: #ff4757;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #ff6b81;
            transform: scale(1.02);
        }
        .admin-panel {
            border-top: 2px solid #ff4757;
            margin-top: 20px;
            padding-top: 20px;
        }
        .team {
            display: inline-block;
            background: rgba(0,0,0,0.5);
            margin: 10px;
            padding: 10px;
            border-radius: 15px;
            min-width: 150px;
        }
        .team h3 {
            margin: 0 0 10px 0;
        }
        .waiting {
            font-size: 24px;
            color: #ffaa00;
        }
        .question-block {
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
        }
        .hidden {
            display: none;
        }
        .score {
            font-size: 20px;
            margin-top: 20px;
        }
        .error-message {
            color: #ff8888;
            background: #440000;
            padding: 10px;
            border-radius: 10px;
            margin: 10px;
        }
        .change-team-area {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>🎌 Аниме викторина</h1>
    <div id="loginScreen">
        <h2>Вход в игру</h2>
        <input type="text" id="nickname" placeholder="Твой никнейм" maxlength="20">
        <select id="teamSelect">
            <option value="0">Команда 1</option>
            <option value="1">Команда 2</option>
            <option value="2">Команда 3</option>
            <option value="3">Команда 4</option>
        </select>
        <button id="joinBtn">Присоединиться</button>
        <div id="adminLoginBlock" style="margin-top: 20px;">
            <input type="password" id="adminPassword" placeholder="Пароль администратора">
            <button id="adminLoginBtn">Войти как админ</button>
        </div>
        <div id="errorDisplay" class="error-message" style="display:none;"></div>
    </div>

    <div id="gameScreen" class="hidden">
        <div id="playerInfo"></div>
        <div id="waitingScreen">
            <div class="waiting">⏳ Ожидание начала игры...</div>
            <div id="teamsStatus"></div>
            <!-- Блок смены команды (только для игроков, не админа) -->
            <div id="changeTeamBlock" class="change-team-area hidden">
                <select id="newTeamSelect">
                    <option value="0">Команда 1</option>
                    <option value="1">Команда 2</option>
                    <option value="2">Команда 3</option>
                    <option value="3">Команда 4</option>
                </select>
                <button id="changeTeamBtn">Сменить команду</button>
                <div id="changeTeamMsg" style="font-size:14px; margin-top:5px;"></div>
            </div>
        </div>
        <div id="quizScreen" class="hidden">
            <div class="question-block">
                <div id="questionText"></div>
                <div id="optionsArea"></div>
            </div>
            <div class="score" id="scoreDisplay">Счёт: 0</div>
        </div>
        <div id="resultScreen" class="hidden">
            <h2>Игра окончена!</h2>
            <div id="finalResults"></div>
        </div>
    </div>

    <div id="adminPanel" class="hidden admin-panel">
        <h2>🔧 Панель администратора</h2>
        <div id="adminTeamsStatus"></div>
        <button id="startGameBtn">🚀 СТАРТ ИГРЫ</button>
        <button id="resetGameBtn">🔄 Сбросить игру</button>
    </div>
</div>

<script>
    console.log("Скрипт загружен");

    // ========== КОНФИГ FIREBASE ==========
    const firebaseConfig = {
        apiKey: "AIzaSyCGkWhrIEg-WPusS2QqTILVWCht-WXS4ug",
        authDomain: "anime-database-7d48e.firebaseapp.com",
        databaseURL: "https://anime-database-7d48e-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "anime-database-7d48e",
        storageBucket: "anime-database-7d48e.firebasestorage.app",
        messagingSenderId: "143822737117",
        appId: "1:143822737117:web:5195d511264dbb80175534"
    };
    console.log("Конфиг:", firebaseConfig);

    // Инициализация Firebase
    let db;
    try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        console.log("Firebase инициализирован");
        db.ref('.info/connected').on('value', (snap) => {
            console.log("Соединение с Firebase:", snap.val() ? "есть" : "нет");
        });
    } catch (e) {
        console.error("Ошибка Firebase:", e);
        document.getElementById('errorDisplay').innerText = "Ошибка Firebase: " + e.message;
        document.getElementById('errorDisplay').style.display = 'block';
    }

    // Переменные игры
    let currentUser = null;
    let gameActive = false;
    let currentQuestionIndex = 0;
    let userScore = 0;
    const questions = [
        { text: "Кто главный герой «Наруто»?", options: ["Саске", "Наруто", "Какаши", "Сакура"], correct: 1 },
        { text: "Техника Гоку из «Драгон Болл»?", options: ["Расенган", "Камехамеха", "Гетсуга", "Реактор"], correct: 1 },
        { text: "Где появляется Леви Аккерман?", options: ["Ванпанчмен", "Токийский гуль", "Атака титанов", "Моя геройская академия"], correct: 2 },
        { text: "Автор «Ван Пис»?", options: ["Ода", "Кисимото", "Тогаси", "Кубо"], correct: 0 }
    ];

    function showError(msg) {
        const errDiv = document.getElementById('errorDisplay');
        errDiv.innerText = msg;
        errDiv.style.display = 'block';
        setTimeout(() => errDiv.style.display = 'none', 5000);
    }

    // --- Игровые функции ---
    function listenGameState() {
        if (!db) return;
        db.ref('gameState').on('value', (snap) => {
            const state = snap.val();
            if (state) {
                gameActive = state.active;
                currentQuestionIndex = state.currentQuestion;
                if (gameActive && currentQuestionIndex < questions.length) showQuizScreen();
                else if (gameActive && currentQuestionIndex >= questions.length) showFinalResults();
                else if (!gameActive && currentUser && !currentUser.isAdmin) {
                    showWaitingScreen();
                    // Показываем блок смены команды, если игра не активна
                    const changeBlock = document.getElementById('changeTeamBlock');
                    if (changeBlock) changeBlock.classList.remove('hidden');
                }
            } else {
                db.ref('gameState').set({ active: false, currentQuestion: 0 });
            }
        });
    }

    function listenQuestions() {
        if (!db) return;
        db.ref('currentQuestion').on('value', (snap) => {
            const idx = snap.val();
            if (idx !== null && gameActive && idx < questions.length) {
                currentQuestionIndex = idx;
                displayQuestion(questions[idx]);
            } else if (idx !== null && gameActive && idx >= questions.length) {
                showFinalResults();
            }
        });
    }

    function listenPlayers() {
        if (!db) return;
        db.ref('players').on('value', (snap) => {
            const players = snap.val() || {};
            updateTeamsDisplay(players);
            if (currentUser && currentUser.isAdmin) updateAdminTeamsDisplay(players);
        });
    }

    function updateTeamsDisplay(players) {
        const teams = [[], [], [], []];
        for (let id in players) {
            const p = players[id];
            if (p && p.team >= 0 && p.team < 4) teams[p.team].push(p.nickname);
        }
        const container = document.getElementById('teamsStatus');
        if (container) {
            container.innerHTML = '<h3>Состав команд:</h3>' + teams.map((t, i) => `<div class="team"><h3>Команда ${i+1}</h3><div>${t.join(', ') || 'пусто'}</div></div>`).join('');
        }
    }

    function updateAdminTeamsDisplay(players) {
        const teams = [[], [], [], []];
        for (let id in players) {
            const p = players[id];
            if (p && p.team >= 0 && p.team < 4) teams[p.team].push(p.nickname);
        }
        const container = document.getElementById('adminTeamsStatus');
        if (container) {
            container.innerHTML = '<h3>Игроки по командам:</h3>' + teams.map((t, i) => `<div class="team"><strong>Команда ${i+1}</strong>: ${t.join(', ') || 'нет'}</div>`).join('');
        }
    }

    function joinGame(nickname, team) {
        if (!db) { showError("База данных не инициализирована"); return; }
        const userId = nickname + "_" + Date.now();
        currentUser = { nickname, team: parseInt(team), isAdmin: false, id: userId };
        db.ref('players/' + userId).set({
            nickname: nickname,
            team: parseInt(team),
            score: 0
        }).then(() => {
            localStorage.setItem('quizUser', JSON.stringify({ nickname, team: parseInt(team), id: userId, isAdmin: false }));
            showGameScreen();
        }).catch(err => {
            console.error(err);
            showError("Ошибка: " + err.message);
        });
    }

    // Новая функция для смены команды
    function changeTeam(newTeam) {
        if (!db) return;
        if (gameActive) {
            document.getElementById('changeTeamMsg').innerText = "❌ Нельзя сменить команду после начала игры!";
            setTimeout(() => document.getElementById('changeTeamMsg').innerText = "", 3000);
            return;
        }
        if (!currentUser || currentUser.isAdmin) return;
        const teamNum = parseInt(newTeam);
        if (isNaN(teamNum)) return;
        // Обновляем в Firebase
        db.ref('players/' + currentUser.id).update({
            team: teamNum
        }).then(() => {
            currentUser.team = teamNum;
            // Обновляем localStorage
            const saved = localStorage.getItem('quizUser');
            if (saved) {
                let u = JSON.parse(saved);
                u.team = teamNum;
                localStorage.setItem('quizUser', JSON.stringify(u));
            }
            document.getElementById('changeTeamMsg').innerText = "✅ Команда изменена!";
            setTimeout(() => document.getElementById('changeTeamMsg').innerText = "", 2000);
        }).catch(err => {
            console.error(err);
            document.getElementById('changeTeamMsg').innerText = "❌ Ошибка смены команды";
        });
    }

    function adminLogin(password) {
        if (password === "admin123") {
            const adminId = "admin_" + Date.now();
            currentUser = { nickname: "Админ", team: -1, isAdmin: true, id: adminId };
            localStorage.setItem('quizUser', JSON.stringify({ nickname: "Админ", team: -1, id: adminId, isAdmin: true }));
            showGameScreen();
            document.getElementById('adminPanel').classList.remove('hidden');
            if (db) {
                db.ref('gameState').on('value', (snap) => {
                    const state = snap.val();
                    if (state && state.active) {
                        gameActive = true;
                        currentQuestionIndex = state.currentQuestion;
                        if (currentQuestionIndex < questions.length) showQuizScreen();
                        else showFinalResults();
                    } else {
                        gameActive = false;
                        showWaitingScreen();
                    }
                });
                listenPlayers();
            }
        } else {
            alert("Неверный пароль");
        }
    }

    function showGameScreen() {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('gameScreen').classList.remove('hidden');
        document.getElementById('playerInfo').innerText = `Вы: ${currentUser.nickname} ${currentUser.isAdmin ? '(админ)' : ''}`;
        if (!currentUser.isAdmin && db) {
            listenGameState();
            listenPlayers();
            listenQuestions();
            // Покажем блок смены команды, если игра ещё не активна (будет показано в listenGameState)
        } else if (currentUser.isAdmin) {
            // Админу не нужна смена команды
            document.getElementById('changeTeamBlock')?.classList.add('hidden');
        }
    }

    function showWaitingScreen() {
        document.getElementById('waitingScreen').classList.remove('hidden');
        document.getElementById('quizScreen').classList.add('hidden');
        document.getElementById('resultScreen').classList.add('hidden');
        // Убедимся, что блок смены команды виден для не-админа
        if (currentUser && !currentUser.isAdmin) {
            const changeBlock = document.getElementById('changeTeamBlock');
            if (changeBlock) changeBlock.classList.remove('hidden');
        }
    }

    function showQuizScreen() {
        document.getElementById('waitingScreen').classList.add('hidden');
        document.getElementById('quizScreen').classList.remove('hidden');
        document.getElementById('resultScreen').classList.add('hidden');
        // Скрываем блок смены команды, когда игра идёт
        const changeBlock = document.getElementById('changeTeamBlock');
        if (changeBlock) changeBlock.classList.add('hidden');
        if (db) {
            db.ref('currentQuestion').once('value', (snap) => {
                let idx = snap.val();
                if (idx === null) idx = 0;
                if (idx < questions.length) displayQuestion(questions[idx]);
            });
        }
    }

    function displayQuestion(q) {
        document.getElementById('questionText').innerText = q.text;
        const optsDiv = document.getElementById('optionsArea');
        optsDiv.innerHTML = '';
        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.style.display = 'block';
            btn.style.margin = '10px auto';
            btn.style.padding = '10px';
            btn.style.width = '80%';
            btn.style.background = '#ff4757';
            btn.style.border = 'none';
            btn.style.borderRadius = '30px';
            btn.style.color = 'white';
            btn.onclick = () => answerQuestion(i);
            optsDiv.appendChild(btn);
        });
    }

    function answerQuestion(selected) {
        if (!gameActive || !db) return;
        db.ref('currentQuestion').once('value', (snap) => {
            const qIndex = snap.val();
            if (qIndex >= questions.length) return;
            const correct = questions[qIndex].correct;
            if (selected === correct) {
                userScore++;
                document.getElementById('scoreDisplay').innerText = `Счёт: ${userScore}`;
                if (currentUser && !currentUser.isAdmin) {
                    db.ref('players/' + currentUser.id + '/score').set(userScore);
                }
                alert("✅ Правильно!");
            } else {
                alert(`❌ Неправильно. Правильный ответ: ${questions[qIndex].options[correct]}`);
            }
            setTimeout(() => {
                db.ref('gameState').once('value', (stateSnap) => {
                    let state = stateSnap.val();
                    if (state && state.active && state.currentQuestion < questions.length-1) {
                        let newIndex = state.currentQuestion + 1;
                        db.ref('gameState').update({ currentQuestion: newIndex });
                        db.ref('currentQuestion').set(newIndex);
                    } else if (state && state.currentQuestion === questions.length-1) {
                        db.ref('gameState').update({ active: false, currentQuestion: questions.length });
                        showFinalResults();
                    }
                });
            }, 1500);
        });
    }

    function showFinalResults() {
        document.getElementById('waitingScreen').classList.add('hidden');
        document.getElementById('quizScreen').classList.add('hidden');
        document.getElementById('resultScreen').classList.remove('hidden');
        const changeBlock = document.getElementById('changeTeamBlock');
        if (changeBlock) changeBlock.classList.add('hidden');
        if (db) {
            db.ref('players').once('value', (snap) => {
                const players = snap.val() || {};
                let teamsScores = [0,0,0,0];
                for (let id in players) {
                    let p = players[id];
                    if (p && p.team >= 0 && p.team < 4) {
                        teamsScores[p.team] += (p.score || 0);
                    }
                }
                let html = '<h3>Результаты команд:</h3>';
                for (let i=0; i<4; i++) {
                    html += `<div class="team">Команда ${i+1}: ${teamsScores[i]} очков</div>`;
                }
                document.getElementById('finalResults').innerHTML = html;
            });
        }
    }

    // Кнопки админа
    document.getElementById('startGameBtn')?.addEventListener('click', () => {
        if (currentUser && currentUser.isAdmin && db) {
            db.ref('gameState').set({ active: true, currentQuestion: 0 });
            db.ref('currentQuestion').set(0);
            db.ref('players').once('value', (snap) => {
                const players = snap.val();
                for (let id in players) {
                    if (id && !id.startsWith('admin_')) {
                        db.ref('players/' + id + '/score').set(0);
                    }
                }
            });
            alert("Игра начата!");
        } else {
            alert("Вы не админ или база не готова");
        }
    });

    document.getElementById('resetGameBtn')?.addEventListener('click', () => {
        if (currentUser && currentUser.isAdmin && db) {
            if (confirm("Сбросить игру? Все данные удалятся.")) {
                db.ref('gameState').set({ active: false, currentQuestion: 0 });
                db.ref('players').set(null);
                localStorage.removeItem('quizUser');
                location.reload();
            }
        }
    });

    // Обработчики входа
    document.getElementById('joinBtn')?.addEventListener('click', () => {
        const nick = document.getElementById('nickname').value.trim();
        const team = document.getElementById('teamSelect').value;
        if (!nick) { alert("Введи никнейм"); return; }
        joinGame(nick, team);
    });

    document.getElementById('adminLoginBtn')?.addEventListener('click', () => {
        const pwd = document.getElementById('adminPassword').value;
        adminLogin(pwd);
    });

    // Кнопка смены команды
    const changeTeamBtn = document.getElementById('changeTeamBtn');
    const newTeamSelect = document.getElementById('newTeamSelect');
    if (changeTeamBtn) {
        changeTeamBtn.addEventListener('click', () => {
            if (newTeamSelect) {
                changeTeam(newTeamSelect.value);
            }
        });
    }

    // Восстановление сессии
    const saved = localStorage.getItem('quizUser');
    if (saved) {
        try {
            const u = JSON.parse(saved);
            if (u.isAdmin) {
                currentUser = u;
                showGameScreen();
                document.getElementById('adminPanel').classList.remove('hidden');
                if (db) {
                    listenPlayers();
                    db.ref('gameState').on('value', (snap) => {
                        const state = snap.val();
                        if (state && state.active) {
                            gameActive = true;
                            currentQuestionIndex = state.currentQuestion;
                            if (currentQuestionIndex < questions.length) showQuizScreen();
                            else showFinalResults();
                        } else {
                            gameActive = false;
                            showWaitingScreen();
                        }
                    });
                }
            } else {
                currentUser = u;
                if (db) {
                    db.ref('players/' + u.id).once('value', (snap) => {
                        if (!snap.exists()) {
                            db.ref('players/' + u.id).set({ nickname: u.nickname, team: u.team, score: 0 });
                        }
                    });
                    showGameScreen();
                    listenGameState();
                    listenPlayers();
                    listenQuestions();
                }
            }
        } catch(e) { console.error(e); }
    }
</script>
</body>
</html>
