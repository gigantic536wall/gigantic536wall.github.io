<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-eval' 'unsafe-inline' https://www.gstatic.com https://*.firebaseio.com https://*.googleapis.com;">
    <title>Аниме викторина | 8 раундов × 10 вопросов</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        input, button {
            padding: 12px 20px;
            margin: 10px;
            border-radius: 40px;
            border: none;
            font-size: 16px;
        }
        button {
            background: #ff4757;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }
        button:hover {
            background: #ff6b81;
            transform: scale(1.02);
        }
        .team-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        .team-btn {
            width: 160px;
            padding: 20px 10px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 60px;
            transition: 0.2s;
        }
        .team-btn[data-team="0"] { background: #3498db; }
        .team-btn[data-team="1"] { background: #2ecc71; }
        .team-btn[data-team="2"] { background: #f39c12; }
        .team-btn[data-team="3"] { background: #9b59b6; }
        .team-btn.selected { background: #ff4757; box-shadow: 0 0 15px rgba(255,71,87,0.5); transform: scale(1.02); }
        
        .admin-panel {
            border-top: 2px solid #ff4757;
            margin-top: 20px;
            padding-top: 20px;
        }
        .team-display {
            display: inline-block;
            background: rgba(0,0,0,0.5);
            margin: 10px;
            padding: 10px;
            border-radius: 15px;
            min-width: 150px;
            vertical-align: top;
        }
        .waiting { font-size: 24px; color: #ffaa00; }
        .question-block { background: rgba(0,0,0,0.6); border-radius: 20px; padding: 20px; margin-top: 20px; }
        .hidden { display: none; }
        .score { font-size: 20px; margin-top: 20px; }
        .error-message { color: #ff8888; background: #440000; padding: 10px; border-radius: 10px; margin: 10px; }
        .change-team-area { margin-top: 30px; padding-top: 20px; border-top: 2px solid rgba(255,255,255,0.3); }
        .nickname-input { font-size: 18px; width: 250px; }
        .action-buttons { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        
        .image-round-container { text-align: center; }
        .round-image { max-width: 80%; max-height: 300px; border-radius: 15px; margin: 20px auto; display: block; }
        .timer { font-size: 48px; font-weight: bold; margin: 20px; color: #ffaa00; }
        .answer-input { width: 80%; font-size: 18px; text-align: center; }
        .admin-answers-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: rgba(0,0,0,0.5); }
        .admin-answers-table th, .admin-answers-table td { border: 1px solid #fff; padding: 8px; text-align: left; }
        .quiz-option-btn { display: block; width: 80%; margin: 10px auto; background: #ff4757; border: none; border-radius: 40px; color: white; font-size: 18px; padding: 12px; }
        .quiz-option-btn:hover { background: #ff6b81; }
        .progress-info { font-size: 18px; margin-top: 10px; color: #ccc; }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>🎌 Аниме викторина | 8 раундов × 10 вопросов</h1>
    
    <div id="loginScreen">
        <h2>Вход в игру</h2>
        <input type="text" id="nickname" class="nickname-input" placeholder="Твой никнейм" maxlength="20">
        <div class="team-buttons" id="loginTeamButtons">
            <button class="team-btn" data-team="0">Команда 1</button>
            <button class="team-btn" data-team="1">Команда 2</button>
            <button class="team-btn" data-team="2">Команда 3</button>
            <button class="team-btn" data-team="3">Команда 4</button>
        </div>
        <div class="action-buttons">
            <button id="joinBtn">Присоединиться</button>
            <button id="adminLoginFromStartBtn">Войти как администратор</button>
        </div>
        <div id="errorDisplay" class="error-message" style="display:none;"></div>
    </div>

    <div id="gameScreen" class="hidden">
        <div id="playerInfo"></div>
        <div id="waitingScreen">
            <div class="waiting">⏳ Ожидание начала игры...</div>
            <div id="teamsStatus"></div>
            <div id="changeTeamBlock" class="change-team-area hidden">
                <h3>Выберите команду (можно менять до старта)</h3>
                <div class="team-buttons" id="changeTeamButtons">
                    <button class="team-btn" data-team="0">Команда 1</button>
                    <button class="team-btn" data-team="1">Команда 2</button>
                    <button class="team-btn" data-team="2">Команда 3</button>
                    <button class="team-btn" data-team="3">Команда 4</button>
                </div>
                <div id="changeTeamMsg"></div>
                <button id="becomeAdminBtn" style="background: #3498db;">👑 Стать администратором</button>
            </div>
        </div>
        <div id="quizScreen" class="hidden">
            <div id="roundContent"></div>
        </div>
        <div id="resultScreen" class="hidden">
            <h2>Игра окончена!</h2>
            <div id="finalResults"></div>
        </div>
    </div>

    <div id="adminPanel" class="hidden admin-panel">
        <h2>🔧 Панель администратора</h2>
        <div id="adminTeamsStatus"></div>
        <div id="adminRoundControls">
            <button id="startGameBtn">🚀 СТАРТ ИГРЫ (раунд 1)</button>
            <button id="nextRoundBtn" class="hidden">➡️ Следующий раунд</button>
            <button id="resetGameBtn">🔄 Сбросить игру</button>
        </div>
        <div id="adminAnswersPanel"></div>
    </div>
</div>

<script>
    // ---------- КОНФИГ FIREBASE ----------
    const firebaseConfig = {
        apiKey: "AIzaSyCGkWhrIEg-WPusS2QqTILVWCht-WXS4ug",
        authDomain: "anime-database-7d48e.firebaseapp.com",
        databaseURL: "https://anime-database-7d48e-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "anime-database-7d48e",
        storageBucket: "anime-database-7d48e.firebasestorage.app",
        messagingSenderId: "143822737117",
        appId: "1:143822737117:web:5195d511264dbb80175534"
    };
    let db;
    try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        console.log("Firebase инициализирован");
    } catch(e) { console.error(e); }

    // ---------- ДАННЫЕ РАУНДОВ (8 раундов, в каждом 10 вопросов) ----------
    // Для первого раунда тип "image_sequence" - каждый вопрос состоит из 4 последовательных картинок.
    // Вам нужно заполнить свои URL картинок в questions[0] (10 вопросов, у каждого images: массив из 4 URL).
    // Для раундов 2-8 тип "quiz" - обычные вопросы с вариантами ответов.
    
   const roundsData = [
    {   // Раунд 1: 10 вопросов типа "угадай по картинкам" (проверяет админ)
        type: "image_sequence",
        name: "Раунд 1: Угадай аниме по картинке",
        questions: [
            { images: ["https://via.placeholder.com/400x300?text=Аниме1_картинка1", "https://via.placeholder.com/400x300?text=Аниме1_картинка2", "https://via.placeholder.com/400x300?text=Аниме1_картинка3", "https://via.placeholder.com/400x300?text=Аниме1_картинка4"] },
            { images: ["url1","url2","url3","url4"] },
            { images: ["url1","url2","url3","url4"] },
            { images: ["url1","url2","url3","url4"] },
            { images: ["url1","url2","url3","url4"] },
            { images: ["url1","url2","url3","url4"] },
            { images: ["url1","url2","url3","url4"] },
            { images: ["url1","url2","url3","url4"] },
            { images: ["url1","url2","url3","url4"] },
            { images: ["url1","url2","url3","url4"] }
        ]
    },
    // Раунды 2-8: обычные вопросы (заполните своими 10 вопросами в каждом)
    { type: "quiz", name: "Раунд 2: Общие знания", questions: generateQuizQuestions(2) },
    { type: "quiz", name: "Раунд 3: Персонажи", questions: generateQuizQuestions(3) },
    { type: "quiz", name: "Раунд 4: Сюжеты", questions: generateQuizQuestions(4) },
    { type: "quiz", name: "Раунд 5: Манга", questions: generateQuizQuestions(5) },
    { type: "quiz", name: "Раунд 6: Студии", questions: generateQuizQuestions(6) },
    { type: "quiz", name: "Раунд 7: Озвучка", questions: generateQuizQuestions(7) },
    { type: "quiz", name: "Раунд 8: Финал", questions: generateQuizQuestions(8) }
];
    // Функция-заглушка для генерации 10 обычных вопросов (замените на свои)
    function generateQuizQuestions(roundNum) {
        let qs = [];
        for(let i=1; i<=10; i++) {
            qs.push({
                text: `Вопрос ${i} раунда ${roundNum}: Назовите аниме, где главного героя зовут Гоку?`,
                options: ["Наруто", "Драгон Болл", "Ван Пис", "Блич"],
                correct: 1,
                points: 2
            });
        }
        return qs;
    }

    // Текущее состояние игры
    let currentRound = 0;          // 0-индекс
    let currentQuestionIdx = 0;    // вопрос внутри раунда (0..9)
    let gameActive = false;
    let roundInProgress = false;
    let currentUser = null;
    let timerInterval = null;
    
    // Для image_sequence раунда
    let imageStep = 0;              // 0..3 для текущего вопроса
    let answered = false;
    let answerGivenAtStep = -1;
    let userAnswerText = "";
    let currentQuestionObj = null;

    // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----------
    function showError(msg) {
        const errDiv = document.getElementById('errorDisplay');
        if(errDiv) { errDiv.innerText = msg; errDiv.style.display = 'block'; setTimeout(() => errDiv.style.display = 'none', 5000); }
    }

    function awardPoints(playerId, delta) {
        db.ref('players/' + playerId).transaction((player) => {
            if(player) player.score = (player.score || 0) + delta;
            return player;
        });
    }

    function updateTeamsDisplay(players) {
        const teams = [[], [], [], []];
        for (let id in players) {
            const p = players[id];
            if (p && p.team >= 0 && p.team < 4 && !p.isAdmin) teams[p.team].push(p.nickname);
        }
        const container = document.getElementById('teamsStatus');
        if (container) {
            container.innerHTML = '<h3>Состав команд:</h3>' + teams.map((t, i) => `<div class="team-display"><h3>Команда ${i+1}</h3><div>${t.join(', ') || 'пусто'}</div></div>`).join('');
        }
    }

    function updateAdminTeamsDisplay(players) {
        const teams = [[], [], [], []];
        for (let id in players) {
            const p = players[id];
            if (p && p.team >= 0 && p.team < 4 && !p.isAdmin) teams[p.team].push(p.nickname);
        }
        const container = document.getElementById('adminTeamsStatus');
        if (container) {
            container.innerHTML = '<h3>Игроки по командам:</h3>' + teams.map((t, i) => `<div class="team-display"><strong>Команда ${i+1}</strong>: ${t.join(', ') || 'нет'}</div>`).join('');
        }
    }

    // ---------- ОТОБРАЖЕНИЕ ТЕКУЩЕГО ВОПРОСА ДЛЯ ИГРОКА ----------
    function showCurrentQuestion() {
        const round = roundsData[currentRound];
        const question = round.questions[currentQuestionIdx];
        const container = document.getElementById('roundContent');
        if(!container) return;
        
        if(round.type === "image_sequence") {
            // Сброс состояния для нового вопроса
            imageStep = 0;
            answered = false;
            answerGivenAtStep = -1;
            userAnswerText = "";
            currentQuestionObj = question;
            startImageQuestion(question);
        } else if(round.type === "quiz") {
            container.innerHTML = `
                <div class="question-block">
                    <h2>${round.name} | Вопрос ${currentQuestionIdx+1} из ${round.questions.length}</h2>
                    <div style="font-size:24px; margin:20px;">${question.text}</div>
                    <div id="quizOptions"></div>
                </div>
                <div class="progress-info">⏱️ Время на ответ: 15 секунд</div>
            `;
            const optsDiv = document.getElementById('quizOptions');
            question.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.className = "quiz-option-btn";
                btn.onclick = () => answerQuiz(idx);
                optsDiv.appendChild(btn);
            });
            // Таймер 15 секунд для обычного вопроса
            let timeLeft = 15;
            const timerDiv = document.createElement('div');
            timerDiv.className = "timer";
            timerDiv.innerText = timeLeft;
            container.appendChild(timerDiv);
            const timerInterval = setInterval(() => {
                if(!gameActive || !roundInProgress) { clearInterval(timerInterval); return; }
                timeLeft--;
                if(timerDiv) timerDiv.innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    if(roundInProgress) {
                        // Время вышло, не ответил - переходим к следующему вопросу
                        alert("Время вышло!");
                        nextQuestionOrRound();
                    }
                }
            }, 1000);
            window.currentQuizTimer = timerInterval;
        }
    }

    function startImageQuestion(question) {
        if(imageStep >= 4) {
            // Все 4 картинки показаны, переходим к следующему вопросу
            nextQuestionOrRound();
            return;
        }
        const container = document.getElementById('roundContent');
        const imgUrl = question.images[imageStep];
        let timeLeft = 8;
        container.innerHTML = `
            <div class="image-round-container">
                <h2>${roundsData[currentRound].name} | Вопрос ${currentQuestionIdx+1} из ${roundsData[currentRound].questions.length}</h2>
                <div class="timer" id="timer">${timeLeft}</div>
                <img src="${imgUrl}" class="round-image" id="roundImage">
                <div>
                    <input type="text" id="answerInput" class="answer-input" placeholder="Введите название аниме" ${answered ? 'disabled' : ''}>
                    <button id="submitAnswerBtn" ${answered ? 'disabled' : ''}>Ответить</button>
                </div>
                <p>Картинка ${imageStep+1} из 4</p>
            </div>
        `;
        if(!answered) {
            document.getElementById('submitAnswerBtn').onclick = () => {
                if(answered) return;
                const answer = document.getElementById('answerInput').value.trim();
                if(answer === "") { alert("Введите ответ"); return; }
                answered = true;
                answerGivenAtStep = imageStep;
                userAnswerText = answer;
                // Сохраняем ответ в Firebase для админа
                if(currentUser && !currentUser.isAdmin) {
                    const roundAnsRef = db.ref('players/' + currentUser.id + `/roundAnswers/${currentRound}/q${currentQuestionIdx}`);
                    roundAnsRef.set({
                        answered: true,
                        step: imageStep,
                        answer: answer,
                        timestamp: Date.now()
                    });
                }
                document.getElementById('answerInput').disabled = true;
                document.getElementById('submitAnswerBtn').disabled = true;
                // Не останавливаем таймер, просто блокируем ввод
            };
        }
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if(!gameActive || !roundInProgress) { clearInterval(timerInterval); return; }
            timeLeft--;
            const timerDiv = document.getElementById('timer');
            if(timerDiv) timerDiv.innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                if(!answered) {
                    // Не ответил - переходим к следующей картинке
                }
                imageStep++;
                if(imageStep < 4) {
                    startImageQuestion(question);
                } else {
                    // Все 4 картинки показаны, переходим к следующему вопросу
                    nextQuestionOrRound();
                }
            }
        }, 1000);
    }

    function answerQuiz(selectedIdx) {
        if(!gameActive || !roundInProgress) return;
        const round = roundsData[currentRound];
        const question = round.questions[currentQuestionIdx];
        const isCorrect = (selectedIdx === question.correct);
        let delta = isCorrect ? question.points : 0;
        if(delta !== 0) {
            awardPoints(currentUser.id, delta);
            alert(`✅ Правильно! +${delta} баллов`);
        } else {
            alert(`❌ Неправильно. Правильный ответ: ${question.options[question.correct]}`);
        }
        if(window.currentQuizTimer) clearInterval(window.currentQuizTimer);
        nextQuestionOrRound();
    }

    function nextQuestionOrRound() {
        if(timerInterval) clearInterval(timerInterval);
        const round = roundsData[currentRound];
        if(currentQuestionIdx + 1 < round.questions.length) {
            currentQuestionIdx++;
            showCurrentQuestion();
        } else {
            // Раунд закончен
            finishRound();
        }
    }

    function finishRound() {
        roundInProgress = false;
        gameActive = false;
        db.ref('gameState').set({ active: false, currentRound: currentRound, currentQuestion: currentQuestionIdx, roundFinished: true });
        document.getElementById('roundContent').innerHTML = `<div class="waiting">⏳ Раунд завершён. Админ проверяет ответы (для 1-го раунда) и начнёт следующий раунд.</div>`;
        if(currentUser && currentUser.isAdmin) {
            document.getElementById('nextRoundBtn').classList.remove('hidden');
            listenAllPlayersAnswers();
        }
    }

    // Админ: отображение ответов игроков для image_sequence раунда
    function listenAllPlayersAnswers() {
        if(!db || !currentUser?.isAdmin) return;
        db.ref('players').on('value', (snap) => {
            const players = snap.val() || {};
            updateAdminAnswersTable(players);
        });
    }

    function updateAdminAnswersTable(players) {
        const container = document.getElementById('adminAnswersPanel');
        if(!container) return;
        const round = roundsData[currentRound];
        if(!gameActive && round.type === "image_sequence") {
            let html = `<h3>Ответы игроков на ${round.name}</h3>`;
            html += `<table class="admin-answers-table"><tr><th>Игрок</th><th>Команда</th><th>Вопрос</th><th>Ответ дан на картинке №</th><th>Текст ответа</th><th>Действие</th></tr>`;
            let anyAnswer = false;
            for(let id in players) {
                const p = players[id];
                if(p.isAdmin || !p.nickname) continue;
                const answers = p.roundAnswers && p.roundAnswers[currentRound];
                if(answers) {
                    for(let qIdx in answers) {
                        const ans = answers[qIdx];
                        if(ans && ans.answered) {
                            anyAnswer = true;
                            const questionData = round.questions[parseInt(qIdx)];
                            const points = [4,3,2,1][ans.step];
                            html += `<tr>
                                <td>${p.nickname}</td>
                                <td>Команда ${p.team+1}</td>
                                <td>Вопрос ${parseInt(qIdx)+1}</td>
                                <td>${ans.step+1}</td>
                                <td>${ans.answer}</td>
                                <td>
                                    <button class="mark-correct" data-player="${id}" data-q="${qIdx}" data-step="${ans.step}">✅ Правильно (+${points})</button>
                                    <button class="mark-wrong" data-player="${id}" data-q="${qIdx}">❌ Неправильно (-1)</button>
                                </td>
                            </tr>`;
                        }
                    }
                }
            }
            if(!anyAnswer) html += `<tr><td colspan="6">Нет ответов</td></tr>`;
            html += `</table>`;
            container.innerHTML = html;
            document.querySelectorAll('.mark-correct').forEach(btn => {
                btn.addEventListener('click', () => {
                    const playerId = btn.getAttribute('data-player');
                    const qIdx = btn.getAttribute('data-q');
                    const step = parseInt(btn.getAttribute('data-step'));
                    const points = [4,3,2,1][step];
                    awardPoints(playerId, points);
                    db.ref(`players/${playerId}/roundAnswers/${currentRound}/${qIdx}`).remove();
                    btn.parentElement.parentElement.remove();
                });
            });
            document.querySelectorAll('.mark-wrong').forEach(btn => {
                btn.addEventListener('click', () => {
                    const playerId = btn.getAttribute('data-player');
                    const qIdx = btn.getAttribute('data-q');
                    awardPoints(playerId, -1);
                    db.ref(`players/${playerId}/roundAnswers/${currentRound}/${qIdx}`).remove();
                    btn.parentElement.parentElement.remove();
                });
            });
        } else if(round.type !== "image_sequence") {
            container.innerHTML = `<p>Раунд ${round.name} - автоматическая проверка (админ не требуется)</p>`;
        } else {
            container.innerHTML = "";
        }
    }

    // Запуск раунда админом
    function startRound(roundIndex) {
        if(roundIndex >= roundsData.length) {
            alert("Игра завершена!");
            showFinalResults();
            return;
        }
        currentRound = roundIndex;
        currentQuestionIdx = 0;
        gameActive = true;
        roundInProgress = true;
        db.ref('gameState').set({ active: true, currentRound: roundIndex, currentQuestion: 0, roundFinished: false });
        // Очистить предыдущие ответы для этого раунда
        db.ref('players').once('value', (snap) => {
            const players = snap.val();
            for(let id in players) {
                if(!players[id].isAdmin) {
                    db.ref(`players/${id}/roundAnswers/${roundIndex}`).remove();
                }
            }
        });
        showCurrentQuestion();
        if(currentUser && currentUser.isAdmin) {
            document.getElementById('nextRoundBtn').classList.add('hidden');
            listenAllPlayersAnswers();
        }
    }

    function showFinalResults() {
        document.getElementById('waitingScreen').classList.add('hidden');
        document.getElementById('quizScreen').classList.add('hidden');
        document.getElementById('resultScreen').classList.remove('hidden');
        if(db) {
            db.ref('players').once('value', (snap) => {
                const players = snap.val() || {};
                let teamsScores = [0,0,0,0];
                for(let id in players) {
                    let p = players[id];
                    if(p && p.team >= 0 && p.team < 4 && !p.isAdmin) {
                        teamsScores[p.team] += (p.score || 0);
                    }
                }
                let html = '<h3>Итоговые результаты команд:</h3>';
                for(let i=0; i<4; i++) {
                    html += `<div class="team-display">Команда ${i+1}: ${teamsScores[i]} очков</div>`;
                }
                document.getElementById('finalResults').innerHTML = html;
            });
        }
    }

    // ---------- ЛОГИН И АДМИНКА (как ранее) ----------
    function joinGame(nickname, team) {
        if (!db) { showError("База данных не инициализирована"); return; }
        const userId = nickname + "_" + Date.now();
        currentUser = { nickname, team: parseInt(team), isAdmin: false, id: userId };
        db.ref('players/' + userId).set({
            nickname: nickname,
            team: parseInt(team),
            score: 0,
            isAdmin: false
        }).then(() => {
            localStorage.setItem('quizUser', JSON.stringify({ nickname, team: parseInt(team), id: userId, isAdmin: false }));
            showGameScreen();
        }).catch(err => { console.error(err); showError("Ошибка: " + err.message); });
    }

    function adminLogin(password) {
        if (password === "admin123") {
            const adminId = "admin_" + Date.now();
            currentUser = { nickname: "Админ", team: -1, isAdmin: true, id: adminId };
            localStorage.setItem('quizUser', JSON.stringify({ nickname: "Админ", team: -1, id: adminId, isAdmin: true }));
            showGameScreen();
            document.getElementById('adminPanel').classList.remove('hidden');
            if (db) {
                db.ref('gameState').on('value', (snap) => {
                    const state = snap.val();
                    if (state && state.active) {
                        gameActive = true;
                        roundInProgress = true;
                        currentRound = state.currentRound;
                        currentQuestionIdx = state.currentQuestion || 0;
                        if (currentRound < roundsData.length) showCurrentQuestion();
                        else showFinalResults();
                    } else {
                        gameActive = false;
                        roundInProgress = false;
                        showWaitingScreen();
                        if(currentRound < roundsData.length && roundsData[currentRound].type === "image_sequence") {
                            listenAllPlayersAnswers();
                        }
                    }
                });
                listenPlayersForAdmin();
            }
        } else {
            alert("Неверный пароль администратора");
        }
    }

    function listenPlayersForAdmin() {
        if(!db) return;
        db.ref('players').on('value', (snap) => {
            const players = snap.val() || {};
            updateAdminTeamsDisplay(players);
        });
    }

    function showGameScreen() {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('gameScreen').classList.remove('hidden');
        document.getElementById('playerInfo').innerHTML = `Вы: ${currentUser.nickname} ${currentUser.isAdmin ? '(админ)' : ''}`;
        if (!currentUser.isAdmin && db) {
            listenGameStateForPlayer();
            listenPlayersForPlayer();
        } else if (currentUser.isAdmin) {
            document.getElementById('changeTeamBlock')?.classList.add('hidden');
        }
    }

    function listenGameStateForPlayer() {
        if(!db) return;
        db.ref('gameState').on('value', (snap) => {
            const state = snap.val();
            if (state && state.active) {
                gameActive = true;
                roundInProgress = true;
                currentRound = state.currentRound;
                currentQuestionIdx = state.currentQuestion || 0;
                if (currentRound < roundsData.length) {
                    showCurrentQuestion();
                    document.getElementById('quizScreen').classList.remove('hidden');
                    document.getElementById('waitingScreen').classList.add('hidden');
                } else {
                    showFinalResults();
                }
            } else {
                gameActive = false;
                roundInProgress = false;
                showWaitingScreen();
            }
        });
    }

    function listenPlayersForPlayer() {
        if(!db) return;
        db.ref('players').on('value', (snap) => {
            const players = snap.val() || {};
            updateTeamsDisplay(players);
        });
    }

    function showWaitingScreen() {
        document.getElementById('waitingScreen').classList.remove('hidden');
        document.getElementById('quizScreen').classList.add('hidden');
        document.getElementById('resultScreen').classList.add('hidden');
        if (currentUser && !currentUser.isAdmin) {
            const changeBlock = document.getElementById('changeTeamBlock');
            if (changeBlock) changeBlock.classList.remove('hidden');
            const btns = document.querySelectorAll('#changeTeamButtons .team-btn');
            btns.forEach(btn => {
                if(parseInt(btn.getAttribute('data-team')) === currentUser.team) btn.classList.add('selected');
                else btn.classList.remove('selected');
            });
        }
    }

    function changeTeam(newTeam) {
        if (!db) return;
        if (gameActive) {
            document.getElementById('changeTeamMsg').innerHTML = "❌ Нельзя сменить команду после начала игры!";
            setTimeout(() => document.getElementById('changeTeamMsg').innerHTML = "", 3000);
            return;
        }
        if (!currentUser || currentUser.isAdmin) return;
        const teamNum = parseInt(newTeam);
        db.ref('players/' + currentUser.id).update({ team: teamNum }).then(() => {
            currentUser.team = teamNum;
            const saved = localStorage.getItem('quizUser');
            if (saved) {
                let u = JSON.parse(saved);
                u.team = teamNum;
                localStorage.setItem('quizUser', JSON.stringify(u));
            }
            document.getElementById('changeTeamMsg').innerHTML = "✅ Команда изменена!";
            setTimeout(() => document.getElementById('changeTeamMsg').innerHTML = "", 2000);
        }).catch(err => { console.error(err); });
    }

    // ---------- ОБРАБОТЧИКИ ----------
    document.getElementById('joinBtn')?.addEventListener('click', () => {
        const nick = document.getElementById('nickname').value.trim();
        const selectedTeam = document.querySelector('#loginTeamButtons .team-btn.selected')?.getAttribute('data-team');
        if (!nick) { alert("Введи никнейм"); return; }
        if (selectedTeam === undefined) { alert("Выберите команду"); return; }
        joinGame(nick, selectedTeam);
    });

    document.getElementById('adminLoginFromStartBtn')?.addEventListener('click', () => {
        const pwd = prompt("Введите пароль администратора:");
        if (pwd === "admin123") adminLogin(pwd);
        else if(pwd !== null) alert("Неверный пароль");
    });

    document.getElementById('startGameBtn')?.addEventListener('click', () => {
        if (currentUser && currentUser.isAdmin) startRound(0);
    });

    document.getElementById('nextRoundBtn')?.addEventListener('click', () => {
        if (currentUser && currentUser.isAdmin) {
            if (currentRound + 1 < roundsData.length) startRound(currentRound + 1);
            else showFinalResults();
        }
    });

    document.getElementById('resetGameBtn')?.addEventListener('click', () => {
        if (currentUser && currentUser.isAdmin && confirm("Сбросить игру? Все данные удалятся.")) {
            db.ref('gameState').set({ active: false, currentRound: 0, currentQuestion: 0, roundFinished: false });
            db.ref('players').set(null);
            localStorage.removeItem('quizUser');
            location.reload();
        }
    });

    document.getElementById('becomeAdminBtn')?.addEventListener('click', () => {
        const pwd = prompt("Введите пароль администратора:");
        if (pwd === "admin123") {
            if (currentUser && !currentUser.isAdmin && db) db.ref('players/' + currentUser.id).remove();
            adminLogin(pwd);
        } else if(pwd !== null) alert("Неверный пароль");
    });

    document.querySelectorAll('#loginTeamButtons .team-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('#loginTeamButtons .team-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        });
    });
    document.querySelectorAll('#changeTeamButtons .team-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            if (!gameActive && currentUser && !currentUser.isAdmin) {
                changeTeam(btn.getAttribute('data-team'));
                document.querySelectorAll('#changeTeamButtons .team-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
            } else {
                document.getElementById('changeTeamMsg').innerHTML = "Нельзя сменить команду после старта";
                setTimeout(() => document.getElementById('changeTeamMsg').innerHTML = "", 2000);
            }
        });
    });

    const saved = localStorage.getItem('quizUser');
    if (saved) {
        try {
            const u = JSON.parse(saved);
            if (u.isAdmin) {
                currentUser = u;
                showGameScreen();
                document.getElementById('adminPanel').classList.remove('hidden');
                if (db) {
                    listenPlayersForAdmin();
                    db.ref('gameState').on('value', (snap) => {
                        const state = snap.val();
                        if (state && state.active) {
                            gameActive = true;
                            currentRound = state.currentRound;
                            currentQuestionIdx = state.currentQuestion || 0;
                            if (currentRound < roundsData.length) showCurrentQuestion();
                            else showFinalResults();
                        } else {
                            gameActive = false;
                            showWaitingScreen();
                            if (currentRound < roundsData.length && roundsData[currentRound]?.type === "image_sequence") listenAllPlayersAnswers();
                        }
                    });
                }
            } else {
                currentUser = u;
                if (db) {
                    db.ref('players/' + u.id).once('value', (snap) => {
                        if (!snap.exists()) {
                            db.ref('players/' + u.id).set({ nickname: u.nickname, team: u.team, score: 0, isAdmin: false });
                        }
                    });
                    showGameScreen();
                    listenGameStateForPlayer();
                    listenPlayersForPlayer();
                }
            }
        } catch(e) { console.error(e); }
    }
</script>
</body>
</html>
